        // AUTO-DELETE OLD TRANSACTIONS (older than 30 hours)
        async function autoDeleteOldTransactions() {
            if (!currentUser || !userData) return;
            
            const now = Date.now();
            const cutoffTime = now - THIRTY_HOURS_MS;
            
            const transactions = userData.transactions || [];
            const oldTransactions = transactions.filter(t => {
                const timestamp = t.timestamp || new Date(t.date).getTime();
                return timestamp < cutoffTime;
            });
            
            if (oldTransactions.length > 0) {
                console.log(`🗑️ Deleting ${oldTransactions.length} old transactions (older than 30 hours)`);
                
                const updatedTransactions = transactions.filter(t => {
                    const timestamp = t.timestamp || new Date(t.date).getTime();
                    return timestamp >= cutoffTime;
                });
                
                const userRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userRef, {
                    transactions: updatedTransactions
                });
                
                userData.transactions = updatedTransactions;
                console.log(`✅ Cleaned up! ${updatedTransactions.length} transactions remaining`);
            }
        }

        function checkDepositCooldown() {
            const lastDepositTime = localStorage.getItem(`lastDeposit_${currentUser?.uid}`);

                if (timePassed < TEN_MINUTES_MS) {
                    const minutesLeft = Math.ceil((TEN_MINUTES_MS - timePassed) / 60000);
                    return { canSubmit: false, minutesLeft };
                }
            }
            return { canSubmit: true, minutesLeft: 0 };
        }

        function generateTransactionId(type, sequence) {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const typeCode = {
                'deposit': 'DP',
                'withdraw': 'WD',
                'earning': 'ER',
                'referral': 'RF',
                'bonus': 'BN'
            }[type] || 'TX';
            const seq = String(sequence).padStart(3, '0');
            return `${typeCode}-${year}${month}${day}-${seq}`;
        }
        
        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            const dateStr = date.toLocaleDateString('en-US', options);
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            return `${dateStr} • ${timeStr}`;
        }
        
        async function processUserEarnings(uid, userDataSnapshot = null) {
            const userDataToProcess = userDataSnapshot || userData;
            if (!userDataToProcess) return 0;
            
            const activeDeposits = userDataToProcess.activeDeposits || [];
            if (activeDeposits.length === 0) return 0;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayTimestamp = today.getTime();
            
            let totalEarnings = 0;
            let updated = false;
            let earningsTransactions = [];
            
            const updatedDeposits = activeDeposits.map((deposit) => {
                const depositDate = new Date(deposit.date);
                depositDate.setHours(0, 0, 0, 0);
                const depositTimestamp = depositDate.getTime();
                
                const diffTime = todayTimestamp - depositTimestamp;
                const daysSinceDeposit = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const lastEarningDay = deposit.lastEarningDay || 0;
                const daysToPay = Math.max(0, daysSinceDeposit - lastEarningDay);
                
                if (daysToPay > 0 && daysSinceDeposit > 0 && daysSinceDeposit <= 60) {
                    const dailyAmount = deposit.amount * 0.1;
                    
                    for (let day = 1; day <= daysToPay; day++) {
                        const earningDay = lastEarningDay + day;
                        const earningDate = new Date(depositDate);
                        earningDate.setDate(depositDate.getDate() + earningDay);
                        earningDate.setHours(0, 0, 0, 0);
                        const earningTimestamp = earningDate.getTime();
                        
                        totalEarnings += dailyAmount;
                        
                        const transactionId = generateTransactionId('earning', (userDataToProcess.transactions?.length || 0) + earningsTransactions.length + 1);
                        earningsTransactions.push({
                            id: Date.now() + earningsTransactions.length,
                            transactionId: transactionId,
                            type: 'earning',
                            amount: dailyAmount,
                            description: `Daily Profit (10%)`,
                            date: new Date(earningTimestamp).toISOString(),
                            timestamp: earningTimestamp,
                            status: 'completed'
                        });
                    }
                    
                    deposit.lastEarningDay = daysSinceDeposit;
                    deposit.earnedSoFar = (deposit.earnedSoFar || 0) + (dailyAmount * daysToPay);
                    updated = true;
                }
                
                return deposit;
            });
            
            if (totalEarnings > 0 && uid && updated && earningsTransactions.length > 0) {
                const currentTransactions = userDataToProcess.transactions || [];
                const allTransactions = [...earningsTransactions, ...currentTransactions];
                
                await updateDoc(doc(db, 'users', uid), {
                    earnings: increment(totalEarnings),
                    activeDeposits: updatedDeposits,
                    transactions: allTransactions
                });
            }
            
            return totalEarnings;
        }
        
        async function calculateDailyEarnings() {
            if (!userData || !currentUser) return;
            if (isProcessingProfit) return;
            
            isProcessingProfit = true;
            try {
                await processUserEarnings(currentUser.uid, userData);
            } finally {

            }
        }

            const today = new Date().toDateString();
            const lastLoginDate = localStorage.getItem('lastLoginDate');
            
            if (lastLoginDate && lastLoginDate !== today) {
                await calculateDailyEarnings();
            }
            
            localStorage.setItem('lastLoginDate', today);
        }
        
        async function processReferralCommission(userId, depositAmount, level = 1, visited = new Set()) {
            if (depositAmount <= 0 || visited.has(userId)) return;
            visited.add(userId);
            
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) return;
                const user = userSnap.data();
                
                if (!user.referredBy) return;
                
                let commissionRate = level === 1 ? 0.10 : level === 2 ? 0.04 : level === 3 ? 0.01 : 0;
                if (commissionRate === 0) return;
                
                const commission = depositAmount * commissionRate;
                
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where("username", "==", user.referredBy));
                const referrerSnapshot = await getDocs(q);
                
                if (!referrerSnapshot.empty) {
                    const referrerDoc = referrerSnapshot.docs[0];
                    const referrerRef = doc(db, 'users', referrerDoc.id);
                    const referrerData = referrerDoc.data();
                    
                    const transactionId = generateTransactionId('referral', (referrerData.transactions?.length || 0) + 1);
                    
                    await updateDoc(referrerRef, {
                        earnings: increment(commission),
                        [`referralEarnings.level${level}`]: increment(commission),
                        transactions: arrayUnion({
                            id: Date.now(),
                            transactionId: transactionId,
                            type: 'referral',
                            amount: commission,
                            description: `Level ${level} Referral Commission (${commissionRate*100}%) from deposit`,
                            date: new Date().toISOString(),
                            timestamp: Date.now(),
                            status: 'completed'
                        })
                    });
                    
                    if (currentUser && currentUser.uid === referrerDoc.id) {
                        showBonusNotification(`+${formatMoney(commission)} from Level ${level} referral!`);
                        await refreshUserData();
                    }
                    
                    await processReferralCommission(referrerDoc.id, depositAmount, level + 1, visited);
                }
                
            } catch (error) {
                console.error('Referral commission error:', error);
            }
        }

        async function submitDepositRequest(amount, phoneNumber, network) {
            if (amount < 10000) { 
                showSweetError('Minimum Amount Required', `Minimum deposit is 10,000 UGX<br>You entered: ${formatMoney(amount)}`); 
                return false; 
            }
            if (!phoneNumber || !/^07\d{8}$/.test(phoneNumber)) { 
                showSweetError('Invalid Phone Number', 'Please enter a valid phone number starting with 07'); 
                return false; 
            }
            
            // Check cooldown
            const cooldown = checkDepositCooldown();
            if (!cooldown.canSubmit) {
                showSweetError('Please Wait', `You already submitted a deposit request. Please wait ${cooldown.minutesLeft} minute(s) before trying again.`);
                return false;
            }
            
            // Check if user already has a pending deposit request in Firestore
            const existingRequests = await getDocs(query(collection(db, 'depositRequests'), where("userId", "==", currentUser.uid), where("status", "==", "pending")));
            if (!existingRequests.empty) {
                showSweetError('Pending Request', 'You already have a pending deposit request. Please wait for it to be processed before submitting another.');
                return false;
            }
            
            try {
                await addDoc(collection(db, 'depositRequests'), {
                    userId: currentUser.uid,
                    username: userData.username,
                    userPhone: userData.phone,
                    amount: amount,
                    depositPhone: phoneNumber,
                    network: network,
                    status: 'pending',
                    requestedAt: serverTimestamp(),
                    timestamp: Date.now()
                });
                
                // Set cooldown
                setDepositCooldown();
                
                showSweetPopup(
                    'Deposit Request Sent! 🎉',
                    `Your request for ${formatMoney(amount)} has been submitted successfully<br><br>📱 Check your phone for the USSD prompt<br>🔐 Enter your mobile PIN to confirm payment<br><br>💰 After confirmation, your funds will reflect in 1-3 minutes<br><br>✨ Instant 10% profit will be added upon approval`,
                    '🎉',
                    'OK, GOT IT'
                );
                return true;
            } catch (error) {
                console.error('Error submitting deposit request:', error);
                showSweetError('Request Failed', 'Failed to submit deposit request. Please try again.');
                return false;
            }
        }

        async function reinvest(amount) {
            if (amount < 10000) { 
                showSweetError('Minimum Amount Required', `Minimum reinvest is 10,000 UGX<br>You entered: ${formatMoney(amount)}`); 
                return false; 
            }
            if ((userData.earnings || 0) < amount) { 
                showSweetError('Insufficient Balance', `You need ${formatMoney(amount)} to reinvest<br>Your available earnings: ${formatMoney(userData.earnings || 0)}`); 
                return false; 
            }
            
            try {
                const reinvestDate = new Date();
                reinvestDate.setHours(0, 0, 0, 0);
                const reinvestTimestamp = reinvestDate.getTime();
                const reinvestTxId = generateTransactionId('deposit', (userData.transactions?.length || 0) + 1);

        async function withdraw(amount, phoneNumber, network) {
            if (systemSettings.withdrawLocked === true) {
                showSweetError('Insufficient Balance', `You need ${formatMoney(amount)} to withdraw<br>Your available earnings: ${formatMoney(userData?.earnings || 0)}`);
                return false;
            }
            
            const settingsRef = doc(db, 'admin', 'settings');
            const settingsSnap = await getDoc(settingsRef);
            if (settingsSnap.exists() && settingsSnap.data().withdrawLocked === true) {
                showSweetError('Insufficient Balance', `You need ${formatMoney(amount)} to withdraw<br>Your available earnings: ${formatMoney(userData?.earnings || 0)}`);
                return false;
            }
            
            if (!hasMadeDeposit()) {
                showSweetError('Cannot Withdraw', 'You must make a deposit first before you can withdraw. Registration and referral bonuses cannot be withdrawn without an active investment.');
                return false;
            }
            
            if (userData.withdrawLocked === true) {
                showSweetError('Account Restricted', 'Your withdrawal access has been locked. Please contact support.');
                return false;
            }
            
            if (amount < 5000) { 
                showSweetError('Minimum Amount Required', `Minimum withdrawal is 5,000 UGX<br>You entered: ${formatMoney(amount)}`); 
                return false; 
            }
            if ((userData.earnings || 0) < amount) { 
                showSweetError('Insufficient Balance', `You need ${formatMoney(amount)} to withdraw<br>Your available earnings: ${formatMoney(userData.earnings || 0)}`); 
                return false; 
            }
            if (!phoneNumber || !/^07\d{8}$/.test(phoneNumber)) { 
                showSweetError('Invalid Phone Number', 'Please enter a valid phone number starting with 07'); 
                return false; 
            }
            
            // Check cooldown
            const cooldown = checkWithdrawalCooldown();
            if (!cooldown.canSubmit) {
                showSweetError('Please Wait', `You already submitted a withdrawal request. Please wait ${cooldown.minutesLeft} minute(s) before trying again.`);
                return false;
            }
            
            // Check if user already has a pending withdrawal request in Firestore
            const existingRequests = await getDocs(query(collection(db, 'withdrawalRequests'), where("userId", "==", currentUser.uid), where("status", "==", "pending")));
            if (!existingRequests.empty) {
                showSweetError('Pending Request', 'You already have a pending withdrawal request. Please wait for it to be processed before submitting another.');
                return false;
            }
            
            const fee = amount * 0.1;
            const netAmount = amount - fee;
            const transactionId = generateTransactionId('withdraw', (userData.transactions?.length || 0) + 1);
            
            try {
                await addDoc(collection(db, 'withdrawalRequests'), {
                    userId: currentUser.uid,
                    username: userData.username,
                    userPhone: userData.phone,
                    amount: amount,
                    withdrawalPhone: phoneNumber,
                    network: network,
                    fee: fee,
                    netAmount: netAmount,
                    status: 'pending',
                    requestedAt: serverTimestamp(),
                    timestamp: Date.now(),
                    transactionId: transactionId
                });
                
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    earnings: increment(-amount),
                    withdraws: increment(netAmount),
                    transactions: arrayUnion({
                        id: Date.now(),
                        transactionId: transactionId,
                        type: 'withdraw',
                        amount: amount,
                        fee: fee,
                        netAmount: netAmount,
                        phoneNumber: phoneNumber,
                        network: network,
                        description: `Withdrawal request: ${formatMoney(amount)} (Fee: ${formatMoney(fee)} | Net: ${formatMoney(netAmount)})`,
                        date: new Date().toISOString(),
                        timestamp: Date.now(),
                        status: 'pending'
                    })
                });
                
                userData.earnings -= amount;
                userData.withdraws += netAmount;
                
                // Set cooldown
                setWithdrawalCooldown();
                
                showSweetSuccess(
                    'Withdrawal Requested! 💸',
                    `Your withdrawal request has been submitted<br><br>💰 Amount: ${formatMoney(amount)}<br>📱 To: ${phoneNumber} (${network})<br>⏱️ Processing: 1-5 minutes<br><br>You will be notified when approved`
                );
                return true;
            } catch (error) { 
                console.error('Withdrawal error:', error);
                showSweetError('Withdrawal Failed', 'Something went wrong. Please try again.');
                return false; 
            }
        }

                        ${referralsList.length > 0 ? `
                            <div class="referral-list">
                                <div class="stat-label" style="margin-top: 12px;">Your Referrals (${referralsList.length})</div>
                                ${referralsWithInvestments.map(ref => `
                                    <div class="referral-item">
                                        <div class="user-info">👤 ${ref.username}</div>
                                        <div class="invested-info">💰 ${formatMoney(ref.invested)}</div>
                                        <div class="date-info">Joined: ${new Date(ref.joinedAt).toLocaleDateString()}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="team-total">
                                💰 Total Team Investment: <span>${formatMoney(totalTeamInvestment)}</span><br>
                                🎯 Your 10% Commission: <span>${formatMoney(level1Commission)}</span>
                            </div>
                        ` : '<div class="small-text text-center mt-2">No referrals yet. Share your link!</div>'}
                    </div>
                </div>
                ${renderBottomNav('refer')}
            `;
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
            document.getElementById('copyLink')?.addEventListener('click', () => copyToClipboard(`https://swwiptrade.site/?ref=${userData?.username}`));
            attachBottomNav();
            renderFloatingWhatsApp();
            setupMenuListeners();
        }
        
        function renderProfile() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    ${renderHeaderWithLogo(true, true)}
                    <div class="card">
                        <div class="stat-box" style="margin-bottom: 12px;"><div class="label">Username</div><div class="value">${userData?.username}</div></div>
                        <div class="stat-box" style="margin-bottom: 12px;"><div class="label">Phone</div><div class="value">${userData?.phone || 'Not set'}</div></div>
                        <div class="stat-box" style="margin-bottom: 12px;"><div class="label">Country</div><div class="value">${userData?.country || 'Uganda'}</div></div>
                        <div class="stat-box" style="margin-bottom: 12px;"><div class="label">Referred By</div><div class="value">${userData?.referredBy || 'None'}</div></div>
                    </div>
                </div>
                ${renderBottomNav('me')}
            `;
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
            attachBottomNav();
            renderFloatingWhatsApp();
            setupMenuListeners();
        }
        
        function renderDeposit() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    ${renderHeaderWithLogo(true, true)}
                    <div class="card">
                        <div class="small-text mb-1">Minimum Deposit: 10,000 UGX</div>
                        <div class="small-text mb-1" style="color: #FFB347;">✨ Instant 10% profit on approved deposit!</div>
                        <div class="network-selector">
                            <div class="network-option ${selectedNetwork === 'MTN' ? 'selected' : ''}" data-network="MTN">📱 MTN</div>
                            <div class="network-option ${selectedNetwork === 'Airtel' ? 'selected' : ''}" data-network="Airtel">📱 Airtel</div>
                        </div>
                        <input type="number" id="depositAmount" placeholder="Enter amount (UGX)" min="10000" step="1000">
                        <input type="tel" id="depositPhone" placeholder="Mobile Money Number (07XXXXXXXX)">
                        <button class="btn btn-primary" id="submitDepositRequest">💰 Submit Deposit Request</button>
                    </div>
                </div>
                ${renderBottomNav('')}
            `;
            
            document.querySelectorAll('.network-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectedNetwork = opt.dataset.network;
                    renderDeposit();
                });
            });
            
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
            document.getElementById('submitDepositRequest')?.addEventListener('click', async () => {
                let amount = parseInt(document.getElementById('depositAmount').value);
                let phone = document.getElementById('depositPhone').value;
                if (!isNaN(amount) && amount >= 10000 && phone && /^07\d{8}$/.test(phone)) { 
                    await submitDepositRequest(amount, phone, selectedNetwork); 
                    renderDashboard(); 
                }
                else showAlert('Enter valid amount (minimum 10,000 UGX) and valid phone number');
            });
            attachBottomNav();
            renderFloatingWhatsApp();
            setupMenuListeners();
        }
        
        function renderReinvest() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    ${renderHeaderWithLogo(true, true)}
                    <div class="card">
                        <div class="stat-label">Available Earnings</div><div style="font-size: 24px; font-weight: bold;">${formatMoney(userData?.earnings || 0)}</div>
                        <div class="small-text mb-1 mt-2">Minimum: 10,000 UGX</div>
                        <input type="number" id="reinvestAmount" placeholder="Enter amount">
                        <button class="btn btn-success" id="submitReinvest">Reinvest</button>
                    </div>
                </div>
                ${renderBottomNav('')}
            `;
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
            document.getElementById('submitReinvest')?.addEventListener('click', async () => {
                const amount = parseInt(document.getElementById('reinvestAmount').value);
                if (!isNaN(amount) && amount >= 10000) { await reinvest(amount); await refreshUserData(); renderDashboard(); }
                else showAlert('Enter valid amount (minimum 10,000 UGX)');
            });
            attachBottomNav();
            renderFloatingWhatsApp();
            setupMenuListeners();
        }
        
        function renderWithdraw() {
            const hasDeposit = hasMadeDeposit();
            const warningMsg = !hasDeposit ? '<div class="alert alert-error" style="margin-bottom: 12px;">⚠️ You must make a deposit first before you can withdraw. Registration and referral bonuses cannot be withdrawn without an active investment.</div>' : '';
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    ${renderHeaderWithLogo(true, true)}
                    <div class="card">
                        ${warningMsg}
                        <div class="stat-label">Available Earnings</div>
                        <div style="font-size: 24px; font-weight: bold;">${formatMoney(userData?.earnings || 0)}</div>
                        <div class="small-text mb-1 mt-2">Min: 5,000 UGX | Fee: 10%</div>
                        <div class="fee-breakdown" id="feePreview" style="display: none;">
                            <div class="fee-row"><span>Requested:</span><span>0 UGX</span></div>
                            <div class="fee-row"><span>Fee (10%):</span><span style="color: #EF4444;">-0 UGX</span></div>
                            <div class="fee-row total"><span>You will receive:</span><span style="color: #10B981;">0 UGX</span></div>
                        </div>
                        <div class="network-selector">
                            <div class="network-option ${selectedNetwork === 'MTN' ? 'selected' : ''}" data-network="MTN">📱 MTN</div>
                            <div class="network-option ${selectedNetwork === 'Airtel' ? 'selected' : ''}" data-network="Airtel">📱 Airtel</div>
                        </div>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" ${!hasDeposit ? 'disabled' : ''} oninput="window.updateFeePreview(this.value)">
                        <input type="tel" id="withdrawPhone" placeholder="Mobile Money Number (07XXXXXXXX)" ${!hasDeposit ? 'disabled' : ''} value="${userData?.phone || ''}">
                        <div class="small-text mb-1">Enter the phone number to receive payment</div>
                        <button class="btn btn-danger" id="submitWithdraw" ${!hasDeposit ? 'disabled' : ''}>Request Withdrawal</button>
                    </div>
                </div>
                ${renderBottomNav('')}
            `;
            
            window.updateFeePreview = (value) => {
                const amount = parseInt(value);
                const feePreview = document.getElementById('feePreview');
                if (amount && amount >= 5000) {
                    const fee = amount * 0.1;
                    const net = amount - fee;
                    const rows = document.querySelectorAll('.fee-row');
                    if (rows[0]) rows[0].innerHTML = `<span>Requested:</span><span>${formatMoney(amount)}</span>`;
                    if (rows[1]) rows[1].innerHTML = `<span>Fee (10%):</span><span style="color: #EF4444;">-${formatMoney(fee)}</span>`;
                    if (rows[2]) rows[2].innerHTML = `<span>You will receive:</span><span style="color: #10B981;">${formatMoney(net)}</span>`;
                    feePreview.style.display = 'block';
                } else {
                    feePreview.style.display = 'none';
                }
            };
            
            document.querySelectorAll('.network-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    selectedNetwork = opt.dataset.network;
                    renderWithdraw();
                });
            });
            
            document.getElementById('backBtn')?.addEventListener('click', () => renderDashboard());
            if (hasDeposit) {
                document.getElementById('submitWithdraw')?.addEventListener('click', async () => {
                    const amount = parseInt(document.getElementById('withdrawAmount').value);
                    const phone = document.getElementById('withdrawPhone').value;
                    if (!isNaN(amount) && amount >= 5000 && phone && /^07\d{8}$/.test(phone)) { 
                        await withdraw(amount, phone, selectedNetwork); 
                        await refreshUserData(); 
                        renderDashboard(); 
                    }
                    else showAlert('Enter valid amount (minimum 5,000 UGX) and valid phone number');
                });
            }
            attachBottomNav();
            renderFloatingWhatsApp();
            setupMenuListeners();
        }
        
        function renderBottomNav(active) {
            return `<div class="bottom-nav">
                <button class="nav-item ${active === 'home' ? 'active' : ''}" id="navHome"><div class="nav-icon">🏠</div><span>Home</span></button>
                <button class="nav-item ${active === 'transactions' ? 'active' : ''}" id="navTrans"><div class="nav-icon">📋</div><span>Trans</span></button>
                <button class="nav-item ${active === 'refer' ? 'active' : ''}" id="navRefer"><div class="nav-icon">👥</div><span>Refer</span></button>
                <button class="nav-item ${active === 'table' ? 'active' : ''}" id="navTable"><div class="nav-icon">📊</div><span>Table</span></button>
                <button class="nav-item ${active === 'me' ? 'active' : ''}" id="navMe"><div class="nav-icon">👤</div><span>Me</span></button>
            </div>`;
        }
        
        function attachBottomNav() {
            document.getElementById('navHome')?.addEventListener('click', () => renderDashboard());
            document.getElementById('navTrans')?.addEventListener('click', () => renderTransactions());
            document.getElementById('navRefer')?.addEventListener('click', () => renderReferrals());
            document.getElementById('navTable')?.addEventListener('click', () => renderTable());
            document.getElementById('navMe')?.addEventListener('click', () => renderProfile());
        }
        
        // Initialize
        await loadWhatsAppLinks();
        referralCode = getReferralFromUrl();
        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                setupRealtimeListener(currentUser.uid);
                await loadUserData(user.uid);
                setupActivityListeners();
                setupAutoRefresh();
                startTradingUpdates();
                await checkMissedDaysOnLogin();
                renderFloatingWhatsApp();
            }
            else { 
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                if (refreshTimer) clearInterval(refreshTimer);
                if (inactivityTimer) clearTimeout(inactivityTimer);
                stopTradingUpdates();
                currentUser = null; 
                userData = null;
                renderFloatingWhatsApp();
                if (referralCode) {
                    showRegisterPage();
                } else {
                    showLoginPage();
                }
            }
        });
    </script>
</body>
</html>
