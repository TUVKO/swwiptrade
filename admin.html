        .slider:before {
            position: absolute;

<body>
    <div id="app">
        <div class="container">
            <div class="loading">Loading Admin Panel...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc, addDoc, increment, arrayUnion, serverTimestamp, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBHid32ayCNww0DOhmHX5tLMlLy49Nep-E",
            authDomain: "swwiptrade.firebaseapp.com",
            projectId: "swwiptrade",
            storageBucket: "swwiptrade.firebasestorage.app",
            messagingSenderId: "822087763839",
            appId: "1:822087763839:web:570fd903ff94ec62253c4a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "SWWIPTRADE2024";
        
        let currentUser = null;
        let allUsers = [];
        let pendingWithdrawals = [];
        let pendingDeposits = [];
        let pendingWithdrawalRequests = [];
        let systemSettings = {
            withdrawLocked: false,
            minDeposit: 10000,
            minWithdraw: 5000,
            withdrawFee: 10,
            dailyProfit: 10,
            whatsappChatLink: "",
            whatsappGroupLink: "",
            adminCommissionRate: 3.5,
            adminEarnings: 0,
            hideWithdrawLock: true,
            appDownloadDisabled: false,
            warningsEnabled: true
        };
        let currentTab = 'warnings';
        let notificationPermission = false;
        let depositListener = null;
        let withdrawalListener = null;
        
        const APK_DOWNLOAD_URL = "https://files.appsgeyser.com/SWWIPTRADE_19679351.apk";
        
        function formatMoney(amount) {
            return (amount || 0).toLocaleString() + ' UGX';
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerText = message;
            const container = document.querySelector('.container');
            if (container && container.firstChild) {
                container.insertBefore(alertDiv, container.firstChild);
                setTimeout(() => alertDiv.remove(), 3000);
            }
        }
        
        function playNotificationSound() {
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        function showBrowserNotification(title, body, icon = 'https://swwiptrade.site/logo.png') {
            if (notificationPermission && 'Notification' in window) {
                try {
                    const notification = new Notification(title, { body, icon });
                    setTimeout(() => notification.close(), 5000);
                } catch (e) {
                    console.log('Notification error:', e);
                }
            }
        }
        
        function requestNotificationPermission() {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    notificationPermission = true;
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        notificationPermission = permission === 'granted';
                    });
                }
            }
        }
        
        // ========== WARNING SYSTEM FUNCTIONS ==========
        async function sendWarningToUser(userId, warningData) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    showAlert('User not found!', 'error');
                    return false;
                }
                
                const warning = {
                    id: Date.now().toString(),
                    type: warningData.type,
                    subject: warningData.subject,
                    message: warningData.message,
                    sentBy: 'admin',
                    sentAt: new Date().toISOString(),
                    sentAtTimestamp: Date.now(),
                    status: 'active',
                    acknowledged: false,
                    acknowledgedAt: null,
                    stopShowing: false
                };
                
                const currentWarnings = userSnap.data().warnings || [];
                
                await updateDoc(userRef, {
                    warnings: [...currentWarnings, warning]
                });
                
                showAlert(`✅ Warning sent to ${warningData.username}`, 'success');
                showBrowserNotification(
                    '⚠️ Warning Sent!',
                    `Warning sent to ${warningData.username}: ${warningData.subject}`,
                    'https://swwiptrade.site/logo.png'
                );
                playNotificationSound();
                return true;
            } catch (error) {
                console.error('Error sending warning:', error);
                showAlert('Failed to send warning: ' + error.message, 'error');
                return false;
            }
        }
        
        async function toggleUserWarnings(userId, enabled) {
            try {
                const userRef = doc(db, 'users', userId);
                await updateDoc(userRef, { warningsEnabled: enabled });
                showAlert(`Warnings ${enabled ? 'ENABLED' : 'DISABLED'} for user`, 'success');
                await refreshData();
            } catch (error) {
                console.error('Error toggling user warnings:', error);
                showAlert('Failed to update warning settings', 'error');
            }
        }
        
        async function resolveWarning(userId, warningId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const warnings = user.warnings || [];
                    const updatedWarnings = warnings.map(w => {
                        if (w.id === warningId) {
                            return { ...w, status: 'resolved' };
                        }
                        return w;
                    });
                    
                    await updateDoc(userRef, { warnings: updatedWarnings });
                    showAlert('Warning marked as resolved', 'success');
                    await refreshData();
                }
            } catch (error) {
                console.error('Error resolving warning:', error);
                showAlert('Failed to resolve warning', 'error');
            }
        }
        
        async function stopShowingWarning(userId, warningId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const warnings = user.warnings || [];
                    const updatedWarnings = warnings.map(w => {
                        if (w.id === warningId) {
                            return { ...w, stopShowing: true, status: 'stopped' };
                        }
                        return w;
                    });
                    
                    await updateDoc(userRef, { warnings: updatedWarnings });
                    showAlert('Warning will no longer appear to user', 'success');
                    await refreshData();
                }
            } catch (error) {
                console.error('Error stopping warning:', error);
                showAlert('Failed to stop warning', 'error');
            }
        }
        
        async function deleteWarning(userId, warningId) {
            if (confirm('⚠️ Are you sure you want to delete this warning permanently?')) {
                try {
                    const userRef = doc(db, 'users', userId);
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        const user = userSnap.data();
                        const warnings = user.warnings || [];
                        const updatedWarnings = warnings.filter(w => w.id !== warningId);
                        
                        await updateDoc(userRef, { warnings: updatedWarnings });
                        showAlert('Warning deleted permanently', 'success');
                        await refreshData();
                    }
                } catch (error) {
                    console.error('Error deleting warning:', error);
                    showAlert('Failed to delete warning', 'error');
                }
            }
        }
        
        async function toggleGlobalWarnings(enabled) {
            systemSettings.warningsEnabled = enabled;
            await saveSystemSettings();
            showAlert(`Global warnings ${enabled ? 'ENABLED' : 'DISABLED'}`, 'success');
            renderAdminPanel();
        }
        
        // ========== REAL-TIME DEPOSIT LISTENER ==========
        function setupDepositListener() {
            if (depositListener) return;
            
            depositListener = onSnapshot(collection(db, 'depositRequests'), (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const deposit = change.doc.data();
                        if (deposit.status === 'pending') {
                            const exists = pendingDeposits.some(d => d.requestId === change.doc.id);
                            if (!exists) {
                                const newDeposit = {
                                    ...deposit,
                                    requestId: change.doc.id,
                                    timestamp: deposit.timestamp || Date.now()
                                };
                                pendingDeposits.unshift(newDeposit);
                                renderAdminPanel();
                                playNotificationSound();
                                showBrowserNotification(
                                    '💰 New Deposit Request!',
                                    `${deposit.username} requested ${formatMoney(deposit.amount)} via ${deposit.network || 'MTN'}`,
                                    'https://swwiptrade.site/logo.png'
                                );
                                showAlert(`🔔 NEW DEPOSIT: ${deposit.username} - ${formatMoney(deposit.amount)}`, 'success');
                            }
                        }
                    } else if (change.type === 'removed') {
                        const removedId = change.doc.id;
                        pendingDeposits = pendingDeposits.filter(d => d.requestId !== removedId);
                        renderAdminPanel();
                    } else if (change.type === 'modified') {
                        const deposit = change.doc.data();
                        if (deposit.status !== 'pending') {
                            pendingDeposits = pendingDeposits.filter(d => d.requestId !== change.doc.id);
                            renderAdminPanel();
                        }
                    }
                });
            }, (error) => {
                console.error('Deposit listener error:', error);
            });
        }
        
        // ========== REAL-TIME WITHDRAWAL LISTENER ==========
        function setupWithdrawalListener() {
            if (withdrawalListener) return;
            
            withdrawalListener = onSnapshot(collection(db, 'withdrawalRequests'), (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const withdrawal = change.doc.data();
                        if (withdrawal.status === 'pending') {
                            const exists = pendingWithdrawalRequests.some(w => w.requestId === change.doc.id);
                            if (!exists) {
                                const newWithdrawal = {
                                    ...withdrawal,
                                    requestId: change.doc.id,
                                    timestamp: withdrawal.timestamp || Date.now()
                                };
                                pendingWithdrawalRequests.unshift(newWithdrawal);
                                renderAdminPanel();
                                playNotificationSound();
                                showBrowserNotification(
                                    '💸 New Withdrawal Request!',
                                    `${withdrawal.username} requested ${formatMoney(withdrawal.amount)} to ${withdrawal.withdrawalPhone || withdrawal.userPhone}`,
                                    'https://swwiptrade.site/logo.png'
                                );
                                showAlert(`🔔 NEW WITHDRAWAL: ${withdrawal.username} - ${formatMoney(withdrawal.amount)}`, 'warning');
                            }
                        }
                    } else if (change.type === 'removed') {
                        const removedId = change.doc.id;
                        pendingWithdrawalRequests = pendingWithdrawalRequests.filter(w => w.requestId !== removedId);

                    } else if (change.type === 'modified') {

        function generateTransactionId(type, sequence) {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const typeCode = {
                'deposit': 'DP',
                'withdraw': 'WD',
                'earning': 'ER',
                'referral': 'RF',
                'bonus': 'BN'
            }[type] || 'TX';
            const seq = String(sequence).padStart(3, '0');
            return `${typeCode}-${year}${month}${day}-${seq}`;
        }
        
        // ========== REFERRAL SYSTEM ==========
        async function findUserByUsername(username) {
            if (!username || username.trim() === '') return null;
            const trimmedUsername = username.trim();
            const exactQuery = query(collection(db, 'users'), where("username", "==", trimmedUsername));
            const exactSnapshot = await getDocs(exactQuery);
            if (!exactSnapshot.empty) {
                const doc = exactSnapshot.docs[0];
                return { id: doc.id, data: doc.data() };
            }
            const allUsersSnapshot = await getDocs(collection(db, 'users'));
            for (const doc of allUsersSnapshot.docs) {
                const userData = doc.data();
                const storedUsername = userData.username;
                if (storedUsername && storedUsername.toLowerCase() === trimmedUsername.toLowerCase()) {
                    return { id: doc.id, data: userData };
                }
            }
            return null;
        }
        
        async function processReferralCommission(depositorId, depositAmount) {
            console.log('========================================');
            console.log('💰 REFERRAL COMMISSION PROCESS STARTED');
            console.log(`Deposit Amount: ${formatMoney(depositAmount)}`);
            console.log(`Depositor ID: ${depositorId}`);
            console.log('========================================');
            
            if (depositAmount <= 0) return;
            
            try {
                const depositorRef = doc(db, 'users', depositorId);
                const depositorSnap = await getDoc(depositorRef);
                if (!depositorSnap.exists()) return;
                
                const depositor = depositorSnap.data();
                let referrerUsername = depositor.referredBy;
                if (!referrerUsername || referrerUsername.trim() === '') return;
                
                referrerUsername = referrerUsername.trim();
                let level = 1;
                let commissionRates = { 1: 0.10, 2: 0.04, 3: 0.01 };
                let commissionsAdded = 0;
                let visited = new Set();
                
                while (level <= 3 && referrerUsername && !visited.has(referrerUsername)) {
                    visited.add(referrerUsername);
                    const referrerResult = await findUserByUsername(referrerUsername);
                    if (!referrerResult) break;
                    
                    const currentReferrerId = referrerResult.id;
                    const currentReferrerData = referrerResult.data;
                    const commissionAmount = depositAmount * commissionRates[level];
                    if (commissionAmount <= 0) break;
                    
                    const transactionCount = (currentReferrerData.transactions || []).length;
                    const transactionId = generateTransactionId('referral', transactionCount + 1);
                    
                    await updateDoc(doc(db, 'users', currentReferrerId), {
                        earnings: increment(commissionAmount),
                        [`referralEarnings.level${level}`]: increment(commissionAmount),
                        transactions: arrayUnion({
                            id: Date.now(),
                            transactionId: transactionId,
                            type: 'referral',
                            amount: commissionAmount,
                            description: `Level ${level} Referral Commission (${commissionRates[level]*100}%) from ${depositor.username}'s deposit of ${formatMoney(depositAmount)}`,
                            date: new Date().toISOString(),
                            timestamp: Date.now(),
                            status: 'completed'
                        })
                    });
                    commissionsAdded++;
                    referrerUsername = currentReferrerData.referredBy ? currentReferrerData.referredBy.trim() : null;
                    level++;
                }
                if (commissionsAdded > 0) {
                    showAlert(`🎉 Referral commissions added! ${commissionsAdded} upline(s) received bonuses.`, 'success');
                }
            } catch (error) {
                console.error('❌ Referral commission error:', error);
                showAlert('Referral processing failed: ' + error.message, 'error');
            }
        }
        
        async function approveDeposit(requestId, userId, amount, phoneNumber, network) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    showAlert('User not found!', 'error');
                    return false;
                }
                
                const user = userSnap.data();
                const firstDayProfit = amount * 0.1;
                const adminCommission = amount * (systemSettings.adminCommissionRate / 100);
                
                const depositDate = new Date();
                depositDate.setHours(0, 0, 0, 0);
                const depositTimestamp = depositDate.getTime();
                
                const depositTxId = generateTransactionId('deposit', (user.transactions?.length || 0) + 1);
                const profitTxId = generateTransactionId('earning', (user.transactions?.length || 0) + 2);
                
                await updateDoc(userRef, {
                    deposits: increment(amount),
                    earnings: increment(firstDayProfit),
                    activeDeposits: arrayUnion({
                        id: Date.now(), 
                        amount, 
                        date: depositTimestamp,
                        lastEarningDay: 0,
                        earnedSoFar: firstDayProfit,
                        phoneNumber: phoneNumber, 
                        network: network
                    }),
                    transactions: arrayUnion(
                        {
                            id: Date.now(),
                            transactionId: depositTxId,
                            type: 'deposit',
                            amount: amount,
                            description: `Deposit of ${amount} UGX via ${network} Mobile Money`,
                            date: new Date().toISOString(),
                            timestamp: depositTimestamp,
                            status: 'completed'
                        },
                        {
                            id: Date.now() + 1,
                            transactionId: profitTxId,
                            type: 'earning',
                            amount: firstDayProfit,
                            description: `Instant 10% profit on deposit (Day 1)`,
                            date: new Date().toISOString(),
                            timestamp: depositTimestamp,
                            status: 'completed'
                        }
                    )
                });
                
                systemSettings.adminEarnings += adminCommission;
                await saveSystemSettings();
                await processReferralCommission(userId, amount);
                await deleteDoc(doc(db, 'depositRequests', requestId));
                
                pendingDeposits = pendingDeposits.filter(d => d.requestId !== requestId);
                renderAdminPanel();
                showAlert(`✅ Deposit approved!`, 'success');
                return true;
            } catch (error) {
                console.error('Error approving deposit:', error);
                showAlert('Failed to approve deposit', 'error');
                return false;
            }
        }

        async function approveWithdrawalRequest(requestId, userId, amount, phoneNumber, network, transactionId, fee, netAmount) {
            const confirmMsg = confirm(
                `✅ CONFIRM WITHDRAWAL PAYOUT\n\n` +
                `User requested: ${formatMoney(amount)}\n` +
                `Fee (10%): -${formatMoney(fee)}\n` +
                `━━━━━━━━━━━━━━━━━━━━\n` +
                `💰 You will send: ${formatMoney(netAmount)}\n\n` +
                `📱 To: ${phoneNumber}\n` +
                `📡 Network: ${network}\n\n` +
                `Mark as paid?`
            );
            if (!confirmMsg) return false;
            
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const transactions = user.transactions || [];
                    const updatedTransactions = transactions.map(t => {
                        if (t.transactionId === transactionId || String(t.id) === transactionId) {
                            return { ...t, status: 'completed', paidAt: new Date().toISOString(), paidAmount: netAmount, paidTo: phoneNumber };
                        }
                        return t;
                    });
                    await updateDoc(userRef, { transactions: updatedTransactions });
                    await deleteDoc(doc(db, 'withdrawalRequests', requestId));
                    pendingWithdrawalRequests = pendingWithdrawalRequests.filter(w => w.requestId !== requestId);
                    renderAdminPanel();
                    showAlert(`✅ Withdrawal approved!`, 'success');
                    return true;
                }
            } catch (error) {
                console.error('Withdrawal approval error:', error);
                showAlert('Approval failed: ' + error.message, 'error');
                return false;
            }
        }

                    <p><strong>Country:</strong> ${user.country || 'Uganda'}</p>
                    <p><strong>Referred By:</strong> ${user.referredBy || 'None'}</p>
                    <p><strong>Deposits:</strong> ${formatMoney(user.deposits || 0)}</p>
                    <p><strong>Earnings:</strong> ${formatMoney(user.earnings || 0)}</p>
                    <p><strong>Withdrawals:</strong> ${formatMoney(user.withdraws || 0)}</p>
                    <p><strong>Warnings Enabled:</strong> ${user.warningsEnabled !== false ? '🟢 YES' : '🔴 NO'}</p>
                    ${activeWarnings.length > 0 ? `
                        <p><strong>⚠️ Active Warnings (${activeWarnings.length}):</strong></p>
                        <div class="referral-list-modal">
                            ${activeWarnings.map(w => `
                                <div class="referral-item-modal">
                                    <span>📢 ${w.subject}</span>
                                    <span class="small-text">${new Date(w.sentAtTimestamp).toLocaleDateString()}</span>
                                    <div style="display: flex; gap: 5px;">
                                        <button class="btn btn-success btn-sm resolve-warning-detail" data-warning-id="${w.id}">Resolve</button>
                                        <button class="btn btn-warning btn-sm stop-warning-detail" data-warning-id="${w.id}">Stop</button>
                                        <button class="btn btn-danger btn-sm delete-warning-detail" data-warning-id="${w.id}">Delete</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p><strong>⚠️ Warnings:</strong> No active warnings</p>'}
                    <div style="display: flex; gap: 10px; margin-top: 16px;">
                        <button class="btn btn-primary" id="closeModal">Close</button>
                        <button class="btn btn-warning" id="sendWarningFromDetail">⚠️ Send Warning</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('closeModal').onclick = () => modal.remove();
            document.getElementById('sendWarningFromDetail').onclick = () => {
                modal.remove();
                showWarningModal({ uid: user.uid, username: user.username, phone: user.phone });
            };
            
            document.querySelectorAll('.resolve-warning-detail').forEach(btn => {
                btn.onclick = async () => {
                    await resolveWarning(user.uid, btn.dataset.warningId);
                    modal.remove();
                    await refreshData();
                };
            });
            document.querySelectorAll('.stop-warning-detail').forEach(btn => {
                btn.onclick = async () => {
                    await stopShowingWarning(user.uid, btn.dataset.warningId);
                    modal.remove();
                    await refreshData();
                };
            });
            document.querySelectorAll('.delete-warning-detail').forEach(btn => {
                btn.onclick = async () => {
                    await deleteWarning(user.uid, btn.dataset.warningId);
                    modal.remove();
                    await refreshData();
                };
            });
        }
        
        async function toggleUserWithdrawLock(userId, currentLock) {
            await updateDoc(doc(db, 'users', userId), { withdrawLocked: !currentLock });
            showAlert(`Withdraw lock ${!currentLock ? 'ENABLED' : 'DISABLED'}`, 'success');
            await refreshData();
        }
        
        async function deleteAllUsers() {
            if (confirm('⚠️ Delete ALL users?')) {
                const batch = writeBatch(db);
                const usersSnapshot = await getDocs(collection(db, 'users'));
                usersSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All users deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllDepositRequests() {
            if (confirm('⚠️ Delete ALL deposit requests?')) {
                const batch = writeBatch(db);
                const depositsSnapshot = await getDocs(collection(db, 'depositRequests'));
                depositsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All deposit requests deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllWithdrawalRequests() {
            if (confirm('⚠️ Delete ALL withdrawal requests?')) {
                const batch = writeBatch(db);
                const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
                withdrawalsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All withdrawal requests deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllData() {
            const confirmText = prompt('⚠️ Type "DELETE" to confirm deletion of ALL data:');
            if (confirmText === 'DELETE') {
                const batch = writeBatch(db);
                const usersSnapshot = await getDocs(collection(db, 'users'));
                usersSnapshot.forEach(doc => batch.delete(doc.ref));
                const depositsSnapshot = await getDocs(collection(db, 'depositRequests'));
                depositsSnapshot.forEach(doc => batch.delete(doc.ref));
                const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
                withdrawalsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('ALL DATA DELETED!', 'warning');
                await refreshData();
            }
        }
        
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            currentUser = { username: 'admin', isAdmin: true };
            requestNotificationPermission();
            await refreshData();
            setupDepositListener();
            setupWithdrawalListener();
        } else {
            showLoginPage();
        }
    </script>
</body>
</html>
