        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc, addDoc, increment, arrayUnion, serverTimestamp, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBHid32ayCNww0DOhmHX5tLMlLy49Nep-E",
            authDomain: "swwiptrade.firebaseapp.com",
            projectId: "swwiptrade",
            storageBucket: "swwiptrade.firebasestorage.app",
            messagingSenderId: "822087763839",
            appId: "1:822087763839:web:570fd903ff94ec62253c4a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "SWWIPTRADE2024";
        
        let currentUser = null;
        let allUsers = [];
        let pendingWithdrawals = [];
        let pendingDeposits = [];
        let pendingWithdrawalRequests = [];
        let goajHistory = [];
        let systemSettings = {
            withdrawLocked: false,

            minWithdraw: 5000,

            dailyProfit: 10,

            whatsappGroupLink: "",

        };
        let currentTab = 'dashboard';

        let depositListener = null;
        let withdrawalListener = null;
        
        const APK_DOWNLOAD_URL = "https://files.appsgeyser.com/SWWIPTRADE_19679351.apk";
        
        function formatMoney(amount) {
            return (amount || 0).toLocaleString() + ' UGX';
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerText = message;
            const container = document.querySelector('.container');
            if (container && container.firstChild) {
                container.insertBefore(alertDiv, container.firstChild);
                setTimeout(() => alertDiv.remove(), 3000);
            }
        }
        
        function playNotificationSound() {
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        function showBrowserNotification(title, body, icon = 'https://swwiptrade.site/logo.png') {
            if (notificationPermission && 'Notification' in window) {
                try {
                    const notification = new Notification(title, { body, icon });
                    setTimeout(() => notification.close(), 5000);
                } catch (e) {
                    console.log('Notification error:', e);
                }
            }
        }
        
        function updateTabTitle(depositCount, withdrawalCount) {
            const total = depositCount + withdrawalCount;
            if (total > 0) {
                document.title = `(${total}) SWWIPTRADE Admin`;
            } else {
                document.title = `SWWIPTRADE Admin`;
            }
        }
        
        function requestNotificationPermission() {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    notificationPermission = true;
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        notificationPermission = permission === 'granted';
                    });
                }
            }
        }
        
        // ========== GOAJ FUNCTIONS ==========
        async function deductFromUserEarnings(userId, deductAmount, reason) {
            if (deductAmount <= 0) {
                showAlert('Deduct amount must be greater than 0', 'error');
                return false;
            }
            
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    showAlert('User not found!', 'error');
                    return false;
                }
                
                const user = userSnap.data();
                const currentEarnings = user.earnings || 0;
                const newEarnings = currentEarnings - deductAmount;
                
                const transactionId = `GOAJ-${Date.now()}`;
                const transaction = {
                    id: Date.now(),
                    transactionId: transactionId,
                    type: 'goaj_deduction',
                    amount: -deductAmount,
                    previousBalance: currentEarnings,
                    newBalance: newEarnings,
                    description: reason || `Deduction of ${formatMoney(deductAmount)} from earnings`,
                    date: new Date().toISOString(),
                    timestamp: Date.now(),
                    status: 'completed'
                };
                
                const currentTransactions = user.transactions || [];
                
                await updateDoc(userRef, {
                    earnings: newEarnings,
                    transactions: [transaction, ...currentTransactions]
                });
                
                const goajHistoryRef = doc(db, 'admin', 'goajHistory');
                const historySnap = await getDoc(goajHistoryRef);
                const existingHistory = historySnap.exists() ? historySnap.data().history || [] : [];
                
                await setDoc(goajHistoryRef, {
                    history: [{
                        id: Date.now(),
                        userId: userId,
                        username: user.username,
                        phone: user.phone,
                        previousEarnings: currentEarnings,
                        deductAmount: deductAmount,
                        newEarnings: newEarnings,
                        reason: reason || '',
                        admin: 'admin',
                        date: new Date().toISOString(),
                        timestamp: Date.now()
                    }, ...existingHistory].slice(0, 50)
                });
                
                showAlert(`✅ Deducted ${formatMoney(deductAmount)} from ${user.username}. New earnings: ${formatMoney(newEarnings)}`, 'success');
                return true;
                
            } catch (error) {
                console.error('Error deducting earnings:', error);
                showAlert('Failed to deduct: ' + error.message, 'error');
                return false;
            }
        }
        
        async function loadGoajHistory() {
            try {
                const historyRef = doc(db, 'admin', 'goajHistory');
                const historySnap = await getDoc(historyRef);
                if (historySnap.exists()) {
                    goajHistory = historySnap.data().history || [];
                } else {
                    goajHistory = [];
                }
            } catch (error) {
                console.error('Error loading GOAJ history:', error);
                goajHistory = [];
            }
            return goajHistory;
        }
        
        async function searchUserForGoaj(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') {
                showAlert('Please enter a username or phone number', 'error');
                return null;
            }
            
            const term = searchTerm.toLowerCase().trim();
            
            const userFound = allUsers.find(u => 
                u.username.toLowerCase() === term || 
                u.username.toLowerCase().includes(term) ||
                (u.phone && u.phone.includes(term))
            );
            
            if (!userFound) {
                showAlert('User not found', 'error');
                return null;
            }
            
            return userFound;
        }
        
        // ========== WARNING SYSTEM FUNCTIONS ==========
        async function sendWarningToUser(userId, warningData) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    showAlert('User not found!', 'error');
                    return false;
                }
                
                const warning = {
                    id: Date.now().toString(),
                    type: warningData.type,
                    subject: warningData.subject,
                    message: warningData.message,
                    sentBy: 'admin',
                    sentAt: new Date().toISOString(),
                    sentAtTimestamp: Date.now(),
                    status: 'active',
                    acknowledged: false,
                    acknowledgedAt: null,
                    stopShowing: false
                };
                
                const currentWarnings = userSnap.data().warnings || [];
                
                await updateDoc(userRef, {
                    warnings: [...currentWarnings, warning]
                });
                
                showAlert(`✅ Warning sent to ${warningData.username}`, 'success');
                showBrowserNotification(
                    '⚠️ Warning Sent!',
                    `Warning sent to ${warningData.username}: ${warningData.subject}`,
                    'https://swwiptrade.site/logo.png'
                );
                playNotificationSound();
                return true;
            } catch (error) {
                console.error('Error sending warning:', error);
                showAlert('Failed to send warning: ' + error.message, 'error');
                return false;
            }
        }
        
        async function resolveWarning(userId, warningId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const warnings = user.warnings || [];
                    const updatedWarnings = warnings.map(w => {
                        if (w.id === warningId) {
                            return { ...w, status: 'resolved' };
                        }
                        return w;
                    });
                    
                    await updateDoc(userRef, { warnings: updatedWarnings });
                    showAlert('Warning marked as resolved', 'success');
                    await refreshData();
                }
            } catch (error) {
                console.error('Error resolving warning:', error);
                showAlert('Failed to resolve warning', 'error');
            }
        }
        
        async function stopShowingWarning(userId, warningId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const warnings = user.warnings || [];
                    const updatedWarnings = warnings.map(w => {
                        if (w.id === warningId) {
                            return { ...w, stopShowing: true, status: 'stopped' };
                        }
                        return w;
                    });
                    
                    await updateDoc(userRef, { warnings: updatedWarnings });
                    showAlert('Warning will no longer appear to user', 'success');
                    await refreshData();
                }
            } catch (error) {
                console.error('Error stopping warning:', error);
                showAlert('Failed to stop warning', 'error');
            }
        }
        
        async function deleteWarning(userId, warningId) {
            if (confirm('⚠️ Are you sure you want to delete this warning permanently?')) {
                try {
                    const userRef = doc(db, 'users', userId);
                    const userSnap = await getDoc(userRef);
                    
                    if (userSnap.exists()) {
                        const user = userSnap.data();
                        const warnings = user.warnings || [];
                        const updatedWarnings = warnings.filter(w => w.id !== warningId);
                        
                        await updateDoc(userRef, { warnings: updatedWarnings });
                        showAlert('Warning deleted permanently', 'success');
                        await refreshData();
                    }
                } catch (error) {
                    console.error('Error deleting warning:', error);
                    showAlert('Failed to delete warning', 'error');
                }
            }
        }
        
        async function toggleGlobalWarnings(enabled) {
            systemSettings.warningsEnabled = enabled;
            await saveSystemSettings();
            showAlert(`Global warnings ${enabled ? 'ENABLED' : 'DISABLED'}`, 'success');
        }
        
        // ========== REAL-TIME LISTENERS ==========
        function setupDepositListener() {
            if (depositListener) return;
            
            depositListener = onSnapshot(collection(db, 'depositRequests'), (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const deposit = change.doc.data();
                        if (deposit.status === 'pending') {
                            const exists = pendingDeposits.some(d => d.requestId === change.doc.id);
                            if (!exists) {
                                const newDeposit = {
                                    ...deposit,
                                    requestId: change.doc.id,
                                    timestamp: deposit.timestamp || Date.now()
                                };
                                pendingDeposits.unshift(newDeposit);
                                updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                                renderAdminPanel();
                                playNotificationSound();
                                showBrowserNotification(
                                    '💰 New Deposit Request!',
                                    `${deposit.username} requested ${formatMoney(deposit.amount)} via ${deposit.network || 'MTN'}`,
                                    'https://swwiptrade.site/logo.png'
                                );
                                showAlert(`🔔 NEW DEPOSIT: ${deposit.username} - ${formatMoney(deposit.amount)}`, 'success');
                            }
                        }

        function generateTransactionId(type, sequence) {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const typeCode = {
                'deposit': 'DP',
                'withdraw': 'WD',
                'earning': 'ER',
                'referral': 'RF',
                'bonus': 'BN',
                'goaj_deduction': 'GJ'
            }[type] || 'TX';
            const seq = String(sequence).padStart(3, '0');
            return `${typeCode}-${year}${month}${day}-${seq}`;
        }
        
        async function findUserByUsername(username) {
            if (!username || username.trim() === '') return null;
            
            const trimmedUsername = username.trim();
            const exactQuery = query(collection(db, 'users'), where("username", "==", trimmedUsername));
            const exactSnapshot = await getDocs(exactQuery);
            
            if (!exactSnapshot.empty) {
                const doc = exactSnapshot.docs[0];
                return { id: doc.id, data: doc.data() };
            }
            
            const allUsersSnapshot = await getDocs(collection(db, 'users'));
            for (const doc of allUsersSnapshot.docs) {
                const userData = doc.data();
                const storedUsername = userData.username;
                if (storedUsername && storedUsername.toLowerCase() === trimmedUsername.toLowerCase()) {
                    return { id: doc.id, data: userData };
                }
            }
            return null;
        }
        
        // ========== FIXED REFERRAL COMMISSION FUNCTION ==========
        async function processReferralCommission(depositorId, depositAmount, level = 1, visited = new Set()) {
            // Stop at level 3
            if (level > 3) return;
            // Prevent infinite loops
            if (visited.has(depositorId)) return;
            visited.add(depositorId);
            
            try {
                console.log(`[REFERRAL] Processing level ${level} for depositor ${depositorId}, amount: ${depositAmount}`);
                
                // Get the depositor's data
                const depositorRef = doc(db, 'users', depositorId);
                const depositorSnap = await getDoc(depositorRef);
                
                if (!depositorSnap.exists()) {
                    console.log(`[REFERRAL] Depositor ${depositorId} not found`);
                    return;
                }
                
                const depositor = depositorSnap.data();
                const referrerUsername = depositor.referredBy;
                
                // No referrer, stop
                if (!referrerUsername) {
                    console.log(`[REFERRAL] User ${depositor.username} has no referrer`);
                    return;
                }
                
                console.log(`[REFERRAL] Looking for referrer: ${referrerUsername}`);
                
                // Find the referrer by username
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where("username", "==", referrerUsername));
                const querySnap = await getDocs(q);
                
                if (querySnap.empty) {
                    console.log(`[REFERRAL] Referrer ${referrerUsername} not found`);
                    return;
                }
                
                const referrerDoc = querySnap.docs[0];
                const referrerId = referrerDoc.id;
                const referrerData = referrerDoc.data();
                
                // Calculate commission based on level
                let commissionRate = 0;
                if (level === 1) commissionRate = 0.10;      // 10%
                else if (level === 2) commissionRate = 0.04; // 4%
                else if (level === 3) commissionRate = 0.01; // 1%
                
                const commission = depositAmount * commissionRate;
                
                if (commission <= 0) {
                    console.log(`[REFERRAL] Commission is 0, skipping`);
                    return;
                }
                
                console.log(`[REFERRAL] Crediting ${commissionRate * 100}% commission: ${commission} UGX to ${referrerUsername}`);
                
                // Get current referral earnings
                const currentLevelEarnings = referrerData.referralEarnings || { level1: 0, level2: 0, level3: 0 };
                const updatedLevelEarnings = {
                    level1: currentLevelEarnings.level1 + (level === 1 ? commission : 0),
                    level2: currentLevelEarnings.level2 + (level === 2 ? commission : 0),
                    level3: currentLevelEarnings.level3 + (level === 3 ? commission : 0)
                };
                
                // Generate transaction ID
                const transactionId = generateTransactionId('referral', (referrerData.transactions?.length || 0) + 1);
                
                // Update referrer's earnings
                await updateDoc(doc(db, 'users', referrerId), {
                    earnings: increment(commission),
                    referralEarnings: updatedLevelEarnings,
                    transactions: arrayUnion({
                        id: Date.now(),
                        transactionId: transactionId,
                        type: 'referral',
                        amount: commission,
                        description: `${level === 1 ? 'Direct' : level === 2 ? '2nd Level' : '3rd Level'} referral commission (${commissionRate * 100}%) from deposit of ${formatMoney(depositAmount)} by ${depositor.username}`,
                        fromUser: depositor.username,
                        level: level,
                        date: new Date().toISOString(),
                        timestamp: Date.now(),
                        status: 'completed'
                    })
                });
                
                console.log(`[REFERRAL] ✅ Successfully credited ${commission} UGX to ${referrerUsername} (Level ${level})`);
                
                // Continue up the chain for next level
                await processReferralCommission(referrerId, depositAmount, level + 1, visited);
                
            } catch (error) {
                console.error('[REFERRAL] Error processing referral commission:', error);
            }
        }

                const depositDate = new Date();
                depositDate.setHours(0, 0, 0, 0);

                const depositTxId = generateTransactionId('deposit', (user.transactions?.length || 0) + 1);
                const profitTxId = generateTransactionId('earning', (user.transactions?.length || 0) + 2);
                
                await updateDoc(userRef, {

                    earnings: increment(firstDayProfit),

                        date: depositTimestamp,

                        earnedSoFar: firstDayProfit,

                        depositsSnapshot.forEach(doc => batch.delete(doc.ref));
                        const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
                        withdrawalsSnapshot.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                        showAlert('ALL DATA DELETED!', 'warning');
                        await refreshData();
                    } else {
                        showAlert('Deletion cancelled', 'error');
                    }
                };
            }
            
            const userSearch = document.getElementById('searchUsers');
            if (userSearch) {
                userSearch.oninput = (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filtered = allUsers.filter(u => u.username.toLowerCase().includes(searchTerm) || (u.phone && u.phone.includes(searchTerm)));
                    const tbody = document.getElementById('usersTableBody');
                    if (tbody) {
                        tbody.innerHTML = filtered.map(user => {
                            const activeWarnings = (user.warnings || []).filter(w => w.status === 'active' && !w.stopShowing).length;
                            return `
                            <tr>
                                <td><strong>${user.username}</strong></td>
                                <td>${user.phone || 'N/A'}</td>
                                <td>${formatMoney(user.deposits || 0)}</td>
                                <td>${formatMoney(user.earnings || 0)}</td>
                                <td>${formatMoney(user.withdraws || 0)}</td>
                                <td>${user.referrals?.length || 0}</td>
                                <td>${activeWarnings > 0 ? `<span class="warnings-badge">⚠️ ${activeWarnings}</span>` : '0'}</td>
                                <td><span class="status-badge ${user.withdrawLocked ? 'status-locked' : 'status-active'}">${user.withdrawLocked ? '🔒 Locked' : '✅ Active'}</span></td>
                                <td>
                                    <button class="btn btn-primary" onclick="window.viewUserDetails('${user.uid}')">📋 View</button>
                                    <button class="btn btn-warning" onclick="window.editUserModal('${user.uid}', '${user.username}', '${user.phone || ''}', ${user.deposits || 0}, ${user.earnings || 0}, ${user.withdrawLocked || false}, '${user.password || ''}')">✏️ Edit</button>
                                    <button class="btn btn-warn" onclick="window.showWarningModal('${user.uid}', '${user.username}', '${user.phone || ''}')">⚠️ Warn</button>
                                    <button class="btn ${user.withdrawLocked ? 'btn-success' : 'btn-warning'}" onclick="window.toggleWithdrawLock('${user.uid}', ${user.withdrawLocked || false})">${user.withdrawLocked ? '🔓 Unlock' : '🔒 Lock'}</button>
                                    <button class="btn btn-danger" onclick="window.deleteUserAccount('${user.uid}', '${user.username}')">🗑️ Delete</button>
                                </td>
                            </tr>
                        `}).join('');
                    }
                };
            }
            
            const goajSearchBtn = document.getElementById('goajSearchBtn');
            const goajSearchInput = document.getElementById('goajSearchInput');
            
            if (goajSearchBtn) {
                goajSearchBtn.onclick = async () => {
                    const searchTerm = goajSearchInput.value;
                    const user = await searchUserForGoaj(searchTerm);
                    if (user) {
                        const resultDiv = document.getElementById('goajUserResult');
                        const usernameSpan = document.getElementById('goajUsername');
                        const phoneSpan = document.getElementById('goajPhone');
                        const currentEarningsSpan = document.getElementById('goajCurrentEarnings');
                        const previewCurrent = document.getElementById('previewCurrent');
                        
                        usernameSpan.innerText = user.username;
                        phoneSpan.innerText = user.phone || 'Not set';
                        currentEarningsSpan.innerText = formatMoney(user.earnings || 0);
                        previewCurrent.innerText = formatMoney(user.earnings || 0);
                        
                        resultDiv.style.display = 'block';
                        
                        window.selectedGoajUser = user;
                        
                        const deductInput = document.getElementById('goajDeductAmount');
                        const previewDeduct = document.getElementById('previewDeduct');
                        const previewNew = document.getElementById('previewNew');
                        
                        const updatePreview = () => {
                            const current = user.earnings || 0;
                            const deduct = parseInt(deductInput.value) || 0;
                            const newBalance = current - deduct;
                            previewDeduct.innerText = formatMoney(deduct);
                            previewNew.innerText = formatMoney(newBalance);
                            if (newBalance < 0) {
                                previewNew.style.color = '#EF4444';
                            } else {
                                previewNew.style.color = '#10B981';
                            }
                        };
                        
                        deductInput.oninput = updatePreview;
                        updatePreview();
                    }
                };
            }
            
            const goajDeductBtn = document.getElementById('goajDeductBtn');
            if (goajDeductBtn) {
                goajDeductBtn.onclick = async () => {
                    if (!window.selectedGoajUser) {
                        showAlert('Please search for a user first', 'error');
                        return;
                    }
                    
                    const deductAmount = parseInt(document.getElementById('goajDeductAmount').value);
                    const reason = document.getElementById('goajReason').value;
                    
                    if (!deductAmount || deductAmount <= 0) {
                        showAlert('Please enter a valid amount to deduct', 'error');
                        return;
                    }
                    
                    const currentEarnings = window.selectedGoajUser.earnings || 0;
                    const newEarnings = currentEarnings - deductAmount;
                    
                    const confirmMsg = confirm(
                        `⚠️ CONFIRM DEDUCTION\n\n` +
                        `User: ${window.selectedGoajUser.username}\n` +
                        `Current Earnings: ${formatMoney(currentEarnings)}\n` +
                        `Deduct Amount: ${formatMoney(deductAmount)}\n` +
                        `━━━━━━━━━━━━━━━━━━━━\n` +
                        `New Earnings: ${formatMoney(newEarnings)}\n\n` +
                        `Reason: ${reason || 'No reason'}\n\n` +
                        `Continue?`
                    );
                    
                    if (confirmMsg) {
                        await deductFromUserEarnings(window.selectedGoajUser.uid, deductAmount, reason);
                        await refreshData();
                        document.getElementById('goajSearchInput').value = '';
                        document.getElementById('goajUserResult').style.display = 'none';
                        document.getElementById('goajDeductAmount').value = '';
                        document.getElementById('goajReason').value = '';
                        window.selectedGoajUser = null;
                    }
                };
            }
            
            const depositSearch = document.getElementById('searchDeposits');
            if (depositSearch) {
                depositSearch.oninput = (e) => {
                    sessionStorage.setItem('depositSearch', e.target.value);
                    renderAdminPanel();
                };
            }
            
            const withdrawalSearch = document.getElementById('searchWithdrawals');
            if (withdrawalSearch) {
                withdrawalSearch.oninput = (e) => {
                    sessionStorage.setItem('withdrawalSearch', e.target.value);
                    renderAdminPanel();
                };
            }
        }
        
        async function getUserReferralsWithInvestment(userId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) return [];
                
                const referrals = userSnap.data().referrals || [];
                const referralsWithInvestment = await Promise.all(referrals.map(async (ref) => {
                    const refUserRef = doc(db, 'users', ref.userId);
                    const refUserSnap = await getDoc(refUserRef);
                    const invested = refUserSnap.exists() ? (refUserSnap.data().deposits || 0) : 0;
                    return {
                        ...ref,
                        invested: invested
                    };
                }));
                return referralsWithInvestment;
            } catch (error) {
                console.error('Error getting referrals:', error);
                return [];
            }
        }
        
        window.viewUserDetails = async (userId) => {
            const user = allUsers.find(u => u.uid === userId);
            if (!user) return;
            
            const referralsWithInvestment = await getUserReferralsWithInvestment(userId);
            const totalTeamInvestment = referralsWithInvestment.reduce((sum, ref) => sum + ref.invested, 0);
            const commission = totalTeamInvestment * 0.1;
            const warnings = user.warnings || [];
            const activeWarnings = warnings.filter(w => w.status === 'active' && !w.stopShowing);
            const stoppedWarnings = warnings.filter(w => w.stopShowing === true);
            const resolvedWarnings = warnings.filter(w => w.status === 'resolved');
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📋 User Details: ${user.username}</h3>
                    <p><strong>Phone:</strong> ${user.phone || 'Not set'}</p>
                    <p><strong>Country:</strong> ${user.country || 'Uganda'}</p>
                    <p><strong>Referred By:</strong> ${user.referredBy || 'None'}</p>
                    <p><strong>Deposits:</strong> ${formatMoney(user.deposits || 0)}</p>
                    <p><strong>Earnings:</strong> ${formatMoney(user.earnings || 0)}</p>
                    <p><strong>Withdrawals:</strong> ${formatMoney(user.withdraws || 0)}</p>
                    <p><strong>Active Deposits:</strong> ${user.activeDeposits?.length || 0}</p>
                    <p><strong>Referrals Count:</strong> ${user.referrals?.length || 0}</p>
                    
                    ${activeWarnings.length > 0 ? `
                        <p><strong>⚠️ ACTIVE WARNINGS (${activeWarnings.length}):</strong></p>
                        <div class="referral-list-modal">
                            ${activeWarnings.map(w => `
                                <div class="referral-item-modal">
                                    <span>📢 ${w.subject}</span>
                                    <span class="small-text">${new Date(w.sentAtTimestamp).toLocaleDateString()}</span>
                                    <div style="display: flex; gap: 5px;">
                                        <button class="btn btn-success btn-sm" onclick="window.resolveWarning('${userId}', '${w.id}')">✅ Resolve</button>
                                        <button class="btn btn-warning btn-sm" onclick="window.stopShowingWarning('${userId}', '${w.id}')">⛔ Stop</button>
                                        <button class="btn btn-danger btn-sm" onclick="window.deleteWarning('${userId}', '${w.id}')">🗑️ Delete</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p><strong>⚠️ Active Warnings:</strong> None</p>'}
                    
                    ${stoppedWarnings.length > 0 ? `
                        <p><strong>⛔ STOPPED WARNINGS (${stoppedWarnings.length}):</strong></p>
                        <div class="referral-list-modal">
                            ${stoppedWarnings.map(w => `
                                <div class="referral-item-modal">
                                    <span>📢 ${w.subject}</span>
                                    <span class="small-text">${new Date(w.sentAtTimestamp).toLocaleDateString()}</span>
                                    <button class="btn btn-success btn-sm" onclick="window.resolveWarning('${userId}', '${w.id}')">✅ Resolve</button>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    ${resolvedWarnings.length > 0 ? `
                        <p><strong>✅ RESOLVED WARNINGS (${resolvedWarnings.length}):</strong></p>
                        <div class="referral-list-modal">
                            ${resolvedWarnings.map(w => `
                                <div class="referral-item-modal">
                                    <span>📢 ${w.subject}</span>
                                    <span class="small-text">${new Date(w.sentAtTimestamp).toLocaleDateString()}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    ${referralsWithInvestment.length > 0 ? `
                        <p><strong>👥 Referrals List:</strong></p>
                        <div class="referral-list-modal">
                            ${referralsWithInvestment.map(ref => `
                                <div class="referral-item-modal">
                                    <span>👤 ${ref.username}</span>
                                    <span>💰 ${formatMoney(ref.invested)}</span>
                                    <span class="small-text">Joined: ${new Date(ref.joinedAt).toLocaleDateString()}</span>
                                </div>
                            `).join('')}
                            <div class="referral-item-modal" style="border-top: 1px solid #FFB347; margin-top: 5px; padding-top: 8px;">
                                <strong>💰 Total Team Investment:</strong>
                                <strong style="color: #FFB347;">${formatMoney(totalTeamInvestment)}</strong>
                            </div>
                            <div class="referral-item-modal">
                                <strong>🎯 Your 10% Commission:</strong>
                                <strong style="color: #10B981;">${formatMoney(commission)}</strong>
                            </div>
                        </div>
                    ` : '<p><strong>👥 Referrals:</strong> None</p>'}
                    <p><strong>Status:</strong> ${user.withdrawLocked ? '🔒 Withdraw Locked' : '✅ Active'}</p>
                    <div style="display: flex; gap: 10px; margin-top: 16px;"><button class="btn btn-primary" id="closeModal">Close</button></div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('closeModal').onclick = () => modal.remove();
        };
        
        window.resolveWarning = async (userId, warningId) => {
            await resolveWarning(userId, warningId);
            await refreshData();
        };
        
        window.stopShowingWarning = async (userId, warningId) => {
            await stopShowingWarning(userId, warningId);
            await refreshData();
        };
        
        window.deleteWarning = async (userId, warningId) => {
            await deleteWarning(userId, warningId);
            await refreshData();
        };
        
        window.showWarningModal = (userId, username, phone) => {
            const user = { uid: userId, username, phone };
            showWarningModal(user);
        };
        
        window.editUserModal = async (userId, username, currentPhone, currentDeposits, currentEarnings, currentLock, currentPassword) => {
            const user = allUsers.find(u => u.uid === userId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>✏️ Edit User: ${username}</h3>
                    <div class="form-group">
                        <label>📱 Phone Number (07XXXXXXXX)</label>
                        <input type="tel" id="editPhone" class="edit-input" value="${currentPhone}" placeholder="07XXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>🔐 Current Password</label>
                        <input type="password" id="editCurrentPassword" class="edit-input" value="${currentPassword || ''}" readonly disabled>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('editCurrentPassword')">👁️ Show</button>
                    </div>
                    <div class="form-group">
                        <label>🔒 New Password (leave blank to keep current)</label>
                        <input type="password" id="editNewPassword" class="edit-input" placeholder="New password (min 6 chars)">
                    </div>
                    <div class="form-group">
                        <label>💰 Deposits Balance</label>
                        <input type="number" id="editDeposits" class="edit-input" value="${currentDeposits}">
                    </div>
                    <div class="form-group">
                        <label>📈 Earnings Balance</label>
                        <input type="number" id="editEarnings" class="edit-input" value="${currentEarnings}">
                        <div class="small-text" style="margin-top: 4px; color: #F59E0B;">💡 Enter NEGATIVE number (e.g., -5000) to create overdraft</div>
                    </div>
                    <div class="toggle-group">
                        <label>🔐 Withdraw Lock</label>
                        <label class="switch">
                            <input type="checkbox" id="editWithdrawLock" ${currentLock ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label>👥 Referred By (username)</label>
                        <input type="text" id="editReferredBy" class="edit-input" value="${user?.referredBy || ''}" placeholder="Leave empty for none">
                    </div>
                    <div class="form-group">
                        <label>💬 Reason for Balance Change (Optional)</label>
                        <input type="text" id="editReason" class="edit-input" placeholder="e.g., Bonus overpayment recovery">
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 16px;">
                        <button class="btn btn-success" id="saveEditBtn">Save Changes</button>
                        <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            window.togglePasswordVisibility = (fieldId) => {
                const field = document.getElementById(fieldId);
                if (field.type === 'password') {
                    field.type = 'text';
                } else {
                    field.type = 'password';
                }
            };
            
            document.getElementById('saveEditBtn').onclick = async () => {
                const phone = document.getElementById('editPhone').value;
                const newPassword = document.getElementById('editNewPassword').value;
                const deposits = parseInt(document.getElementById('editDeposits').value) || 0;
                let earnings = parseInt(document.getElementById('editEarnings').value) || 0;
                const withdrawLocked = document.getElementById('editWithdrawLock').checked;
                const referredBy = document.getElementById('editReferredBy')?.value || null;
                const reason = document.getElementById('editReason')?.value || '';
                
                if (phone && !/^07\d{8}$/.test(phone)) {
                    showAlert('Phone must start with 07 and be 10 digits', 'error');
                    return;
                }
                
                if (earnings !== currentEarnings && reason) {
                    const transactionId = `ADJ-${Date.now()}`;
                    const transaction = {
                        id: Date.now(),
                        transactionId: transactionId,
                        type: 'balance_adjustment',
                        amount: earnings - currentEarnings,
                        previousBalance: currentEarnings,
                        newBalance: earnings,
                        description: reason,
                        date: new Date().toISOString(),
                        timestamp: Date.now(),
                        status: 'completed'
                    };
                    
                    const userRef = doc(db, 'users', userId);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        const user = userSnap.data();
                        const currentTransactions = user.transactions || [];
                        await updateDoc(userRef, {
                            transactions: [transaction, ...currentTransactions]
                        });
                    }
                }
                
                const updates = { phone, deposits, earnings, withdrawLocked };
                if (referredBy !== undefined) updates.referredBy = referredBy || null;
                if (newPassword && newPassword.length >= 6) {
                    updates.newPassword = newPassword;
                }
                
                await editUser(userId, updates);
                modal.remove();
            };
            document.getElementById('cancelEditBtn').onclick = () => modal.remove();
        };
        
        window.toggleWithdrawLock = async (userId, currentLock) => { await toggleUserWithdrawLock(userId, currentLock); };
        window.deleteUserAccount = async (userId, username) => { await deleteUser(userId, username); };
        
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            currentUser = { username: 'admin', isAdmin: true };
            requestNotificationPermission();
            await refreshData();
            setupDepositListener();
            setupWithdrawalListener();
        } else {
            showLoginPage();
        }
    </script>
</body>
</html>
