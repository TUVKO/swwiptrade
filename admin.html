<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SWWIPTRADE - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;

            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        .admin-badge {

            padding: 6px 12px;

            font-weight: bold;
        }

        .logout-btn {
            background: #DC2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .download-app-btn {
            background: #10B981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111216;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #1E1E2A;
        }

        .stat-card .label {
            font-size: 12px;
            color: #8E8E93;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;

            color: #FFD966;
        }

        .stat-card .sub {
            font-size: 12px;
            color: #6B6B76;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #1E1E2A;
            border: none;
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;

        }

        .tab-btn.active {
            background: #FFB347;
            color: #000;
        }

        .badge-count {
            background: #FFB347;
            color: #000;
            border-radius: 20px;

            font-size: 10px;
            margin-left: 6px;

        .tab-btn.active .badge-count {

        }

        .table-wrapper {
            overflow-x: auto;
            background: #111216;
            border-radius: 20px;
            border: 1px solid #1E1E2A;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1E1E2A;
        }

        th {
            color: #FFB347;
            font-weight: 600;
            background: #0D0E14;
        }

        td {
            font-size: 14px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #2A2A35;
            border-radius: 40px;
            background: #0D0E14;
            color: #fff;
            font-size: 14px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }

        .btn-primary {
            background: #FFB347;
            color: #000;
        }

        .btn-danger {
            background: #DC2626;
            color: #fff;
        }

        .btn-success {
            background: #10B981;
            color: #fff;
        }

        .btn-warning {
            background: #F59E0B;
            color: #000;
        }

        .btn-secondary {
            background: #1E1E2A;
            color: #fff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #10B981;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .status-badge {
            display: inline-block;

            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;

        .status-active {

        .status-locked {
            background: #DC262620;
            color: #DC2626;

        .status-pending {

            color: #F59E0B;

        .status-independent {
            background: #8B5CF620;

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);

        .modal-content {
            background: #111216;
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;

            border: 1px solid #1E1E2A;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .alert-success {
            background: rgba(16,185,129,0.15);
            border: 1px solid #10B981;
            color: #A7F3D0;
        }

        .alert-error {
            background: rgba(220,38,38,0.15);
            border: 1px solid #DC2626;
            color: #FECACA;
        }

        .alert-warning {
            background: rgba(245,158,11,0.15);
            border: 1px solid #F59E0B;
            color: #FDE68A;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #FFB347;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #2A2A35;
            border-radius: 12px;
            background: #0D0E14;

        .settings-group {
            margin-bottom: 20px;
            padding: 16px;

        }

            border: 1px solid #DC2626;

        .danger-btn:hover {

        }

        .confirm-input {

            padding: 8px;
            border: 1px solid #DC2626;
            background: #1E1E2A;
            color: white;
            border-radius: 8px;
            width: 100%;
        }

        .whatsapp-preview {
            background: #25D36620;
            border: 1px solid #25D366;
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .whatsapp-preview a {
            color: #25D366;
            text-decoration: none;
            font-weight: bold;

        }
        
        .network-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            background: #1E1E2A;
        }
        
        .edit-input {
            width: 100%;

            border-radius: 8px;
            background: #1E1E2A;
            border: 1px solid #2A2A35;

        .form-group {

        }
        
        .form-group label {
            display: block;

            margin-bottom: 4px;

        .toggle-group {

        .threshold-info {

        }
        
        .fee-column {
            color: #EF4444;
        }
        
        .net-column {

        }
        
        .whatsapp-settings-row {
            margin-bottom: 20px;
            padding: 12px;
            background: #0D0E14;

        }
        
        .whatsapp-settings-row label {
            display: block;

        }
        
        .whatsapp-settings-row input {
            margin-bottom: 8px;
        }
        
        .password-field {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #FFB347;
            cursor: pointer;
            font-size: 12px;
        }
        
        .referral-list-modal {
            max-height: 200px;
            overflow-y: auto;
            background: #0D0E14;
            border-radius: 12px;
            padding: 8px;
            margin-top: 8px;
        }
        
        .referral-item-modal {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #1E1E2A;
            font-size: 12px;
        }
        
        .referral-item-modal:last-child {
            border-bottom: none;
        }
        
        .small-text {
            font-size: 11px;
            color: #8E8E93;
        }
        
        .admin-fee {
            color: #FFB347;
            font-weight: bold;
        }
        
        .total-request {
            color: #10B981;
            font-weight: bold;
        }
        
        .danger-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;

        hr {
            border-color: #2A2A35;

        }
        
        .last-processed {

</head>
<body>
    <div id="app">
        <div class="container">
            <div class="loading">Loading Admin Panel...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc, addDoc, increment, arrayUnion, serverTimestamp, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBHid32ayCNww0DOhmHX5tLMlLy49Nep-E",
            authDomain: "swwiptrade.firebaseapp.com",
            projectId: "swwiptrade",
            storageBucket: "swwiptrade.firebasestorage.app",
            messagingSenderId: "822087763839",
            appId: "1:822087763839:web:570fd903ff94ec62253c4a"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "SWWIPTRADE2024";
        const INDEPENDENT_THRESHOLD = 250000;
        
        let currentUser = null;
        let allUsers = [];
        let pendingWithdrawals = [];
        let pendingDeposits = [];
        let pendingWithdrawalRequests = [];
        let systemSettings = {
            withdrawLocked: false,
            minDeposit: 10000,
            minWithdraw: 5000,
            withdrawFee: 10,
            dailyProfit: 10,
            whatsappChatLink: "",
            whatsappGroupLink: "",
            adminCommissionRate: 3.5,
            adminEarnings: 0,
            independentThreshold: INDEPENDENT_THRESHOLD,
            hideWithdrawLock: true,
            appDownloadDisabled: false
        };
        let currentTab = 'dashboard';
        let notificationPermission = false;
        let depositListener = null;
        let withdrawalListener = null;
        
        // APK Download Link
        const APK_DOWNLOAD_URL = "https://files.appsgeyser.com/SWWIPTRADE_19679351.apk";
        
        function formatMoney(amount) {
            return (amount || 0).toLocaleString() + ' UGX';
        }
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerText = message;
            const container = document.querySelector('.container');
            if (container && container.firstChild) {
                container.insertBefore(alertDiv, container.firstChild);
                setTimeout(() => alertDiv.remove(), 3000);
            }
        }
        
        function playNotificationSound() {
            const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        function showBrowserNotification(title, body, icon = 'https://swwiptrade.site/logo.png') {
            if (notificationPermission && 'Notification' in window) {
                try {
                    const notification = new Notification(title, { body, icon });
                    setTimeout(() => notification.close(), 5000);
                } catch (e) {
                    console.log('Notification error:', e);
                }
            }
        }
        
        function updateTabTitle(depositCount, withdrawalCount) {
            const total = depositCount + withdrawalCount;
            if (total > 0) {
                document.title = `(${total}) SWWIPTRADE Admin`;
            } else {
                document.title = `SWWIPTRADE Admin`;
            }
        }
        
        function requestNotificationPermission() {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    notificationPermission = true;
                } else if (Notification.permission !== 'denied') {
                    Notification.requestPermission().then(permission => {
                        notificationPermission = permission === 'granted';
                    });
                }
            }
        }
        
        // ========== REAL-TIME DEPOSIT LISTENER (INSTANT DISPLAY) ==========
        function setupDepositListener() {
            if (depositListener) return;
            
            depositListener = onSnapshot(collection(db, 'depositRequests'), (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const deposit = change.doc.data();
                        if (deposit.status === 'pending') {
                            const newDeposit = {
                                ...deposit,
                                requestId: change.doc.id,
                                timestamp: deposit.timestamp || Date.now()
                            };
                            pendingDeposits.unshift(newDeposit);
                            updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                            renderAdminPanel();
                            playNotificationSound();
                            showBrowserNotification(
                                '💰 New Deposit Request!',
                                `${deposit.username} requested ${formatMoney(deposit.amount)} via ${deposit.network || 'MTN'}`,
                                'https://swwiptrade.site/logo.png'
                            );
                            showAlert(`🔔 NEW DEPOSIT: ${deposit.username} - ${formatMoney(deposit.amount)}`, 'success');
                        }
                    } else if (change.type === 'removed') {
                        const removedId = change.doc.id;
                        pendingDeposits = pendingDeposits.filter(d => d.requestId !== removedId);
                        updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                        renderAdminPanel();
                    }
                });
            }, (error) => {
                console.error('Deposit listener error:', error);
            });
        }
        
        // ========== REAL-TIME WITHDRAWAL LISTENER (INSTANT DISPLAY) ==========
        function setupWithdrawalListener() {
            if (withdrawalListener) return;
            
            withdrawalListener = onSnapshot(collection(db, 'withdrawalRequests'), (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const withdrawal = change.doc.data();
                        if (withdrawal.status === 'pending') {
                            const newWithdrawal = {
                                ...withdrawal,
                                requestId: change.doc.id,
                                timestamp: withdrawal.timestamp || Date.now()
                            };
                            pendingWithdrawalRequests.unshift(newWithdrawal);
                            updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                            renderAdminPanel();
                            playNotificationSound();
                            showBrowserNotification(
                                '💸 New Withdrawal Request!',
                                `${withdrawal.username} requested ${formatMoney(withdrawal.amount)} to ${withdrawal.withdrawalPhone || withdrawal.userPhone}`,
                                'https://swwiptrade.site/logo.png'
                            );
                            showAlert(`🔔 NEW WITHDRAWAL: ${withdrawal.username} - ${formatMoney(withdrawal.amount)}`, 'warning');
                        }
                    } else if (change.type === 'removed') {
                        const removedId = change.doc.id;
                        pendingWithdrawalRequests = pendingWithdrawalRequests.filter(w => w.requestId !== removedId);
                        updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                        renderAdminPanel();
                    }
                });
            }, (error) => {
                console.error('Withdrawal listener error:', error);
            });
        }
        
        async function checkAndRemoveReferral(userId, depositAmount) {
            if (depositAmount < INDEPENDENT_THRESHOLD) return false;
            
            const userRef = doc(db, 'users', userId);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) return false;
            
            const user = userSnap.data();
            if (!user.referredBy || user.isIndependent) return false;
            
            const referrerUsername = user.referredBy;
            
            await updateDoc(userRef, {
                referredBy: null,
                isIndependent: true,
                independentAt: serverTimestamp(),
                independentAmount: depositAmount
            });
            
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where("username", "==", referrerUsername));
            const referrerSnapshot = await getDocs(q);
            
            if (!referrerSnapshot.empty) {
                const referrerDoc = referrerSnapshot.docs[0];
                const referrerRef = doc(db, 'users', referrerDoc.id);
                const referrerData = referrerDoc.data();
                
                const updatedReferrals = (referrerData.referrals || []).filter(r => r.username !== user.username);
                await updateDoc(referrerRef, { referrals: updatedReferrals });
            }
            
            await updateDoc(userRef, {
                transactions: arrayUnion({
                    id: Date.now(),
                    type: 'info',
                    amount: depositAmount,
                    description: `🎉 INDEPENDENT USER: Deposited ${formatMoney(depositAmount)} which meets the threshold (${formatMoney(INDEPENDENT_THRESHOLD)}). Referral link removed.`,
                    date: new Date().toISOString(),
                    timestamp: Date.now(),
                    status: 'completed'
                })
            });
            
            showAlert(`⚠️ User ${user.username} became INDEPENDENT! Referral link removed.`, 'warning');
            return true;
        }
        
        async function loadSystemSettings() {
            const settingsRef = doc(db, 'admin', 'settings');
            const settingsSnap = await getDoc(settingsRef);
            if (settingsSnap.exists()) {
                systemSettings = { ...systemSettings, ...settingsSnap.data() };
            } else {
                await setDoc(settingsRef, systemSettings);
            }
            return systemSettings;
        }
        
        async function saveSystemSettings() {
            const settingsRef = doc(db, 'admin', 'settings');
            await setDoc(settingsRef, systemSettings);
            showAlert('Settings saved!', 'success');
        }
        
        async function loadAllUsers() {
            const usersSnapshot = await getDocs(collection(db, 'users'));
            allUsers = [];
            usersSnapshot.forEach(doc => {
                const user = doc.data();
                user.uid = doc.id;
                allUsers.push(user);
            });
            return allUsers;
        }
        
        async function loadPendingWithdrawalsFromUsers() {
            pendingWithdrawals = [];
            for (const user of allUsers) {
                const transactions = user.transactions || [];
                const pending = transactions.filter(t => t.type === 'withdraw' && t.status === 'pending');
                pending.forEach(t => {
                    pendingWithdrawals.push({
                        ...t,
                        username: user.username,
                        userId: user.uid,
                        phone: t.phoneNumber || user.phone,
                        network: t.network || 'MTN'
                    });
                });
            }
            return pendingWithdrawals;
        }
        
        async function loadPendingDeposits() {
            const depositsSnapshot = await getDocs(collection(db, 'depositRequests'));
            pendingDeposits = [];
            depositsSnapshot.forEach(doc => {
                const deposit = doc.data();
                if (deposit.status === 'pending') {
                    pendingDeposits.push({
                        ...deposit,
                        requestId: doc.id,
                        timestamp: deposit.timestamp || new Date(deposit.requestedAt?.toDate()).getTime()
                    });
                }
            });
            pendingDeposits.sort((a, b) => a.timestamp - b.timestamp);
            return pendingDeposits;
        }
        
        async function loadPendingWithdrawalRequests() {
            const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
            pendingWithdrawalRequests = [];
            withdrawalsSnapshot.forEach(doc => {
                const withdrawal = doc.data();
                if (withdrawal.status === 'pending') {
                    pendingWithdrawalRequests.push({
                        ...withdrawal,
                        requestId: doc.id,
                        timestamp: withdrawal.timestamp || new Date(withdrawal.requestedAt?.toDate()).getTime()
                    });
                }
            });
            pendingWithdrawalRequests.sort((a, b) => a.timestamp - b.timestamp);
            return pendingWithdrawalRequests;
        }
        
        function generateTransactionId(type, sequence) {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const typeCode = {
                'deposit': 'DP',
                'withdraw': 'WD',
                'earning': 'ER',
                'referral': 'RF',
                'bonus': 'BN'
            }[type] || 'TX';
            const seq = String(sequence).padStart(3, '0');
            return `${typeCode}-${year}${month}${day}-${seq}`;
        }
        
        async function processReferralCommissionForDeposit(userId, depositAmount) {
            if (depositAmount >= INDEPENDENT_THRESHOLD) return;
            if (depositAmount <= 0) return;
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) return;
                const user = userSnap.data();
                
                if (user.isIndependent) return;
                if (!user.referredBy) return;
                
                let level = 1;
                let commissionRate = 0.10;
                let currentUserId = userId;
                let visited = new Set();
                
                while (level <= 3 && currentUserId && !visited.has(currentUserId)) {
                    visited.add(currentUserId);
                    const currentUserRef = doc(db, 'users', currentUserId);
                    const currentUserSnap = await getDoc(currentUserRef);
                    if (!currentUserSnap.exists()) break;
                    const currentUserData = currentUserSnap.data();
                    if (!currentUserData.referredBy) break;
                    
                    const commission = depositAmount * commissionRate;
                    const referrerRef = doc(db, 'users', currentUserData.referredBy);
                    const referrerSnap = await getDoc(referrerRef);
                    
                    if (referrerSnap.exists()) {
                        const referrerData = referrerSnap.data();
                        const transactionId = generateTransactionId('referral', (referrerData.transactions?.length || 0) + 1);
                        await updateDoc(referrerRef, {
                            earnings: increment(commission),
                            [`referralEarnings.level${level}`]: increment(commission),
                            transactions: arrayUnion({
                                id: Date.now(),
                                transactionId: transactionId,
                                type: 'referral',
                                amount: commission,
                                description: `Level ${level} Referral Commission (${commissionRate*100}%) from deposit`,
                                date: new Date().toISOString(),
                                timestamp: Date.now(),
                                status: 'completed'
                            })
                        });
                    }
                    currentUserId = currentUserData.referredBy;
                    level++;
                    if (level === 2) commissionRate = 0.04;
                    if (level === 3) commissionRate = 0.01;
                }
            } catch (error) {
                console.error('Referral commission error:', error);
            }
        }
        
        async function approveDeposit(requestId, userId, amount, phoneNumber, network) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    showAlert('User not found!', 'error');
                    return false;
                }
                
                const user = userSnap.data();
                const firstDayProfit = amount * 0.1;
                const adminCommission = amount * (systemSettings.adminCommissionRate / 100);
                
                const depositDate = new Date();
                depositDate.setHours(0, 0, 0, 0);
                const depositTimestamp = depositDate.getTime();
                
                const depositTxId = generateTransactionId('deposit', (user.transactions?.length || 0) + 1);
                const profitTxId = generateTransactionId('earning', (user.transactions?.length || 0) + 2);
                
                const becameIndependent = await checkAndRemoveReferral(userId, amount);
                
                await updateDoc(userRef, {
                    deposits: increment(amount),
                    earnings: increment(firstDayProfit),
                    activeDeposits: arrayUnion({
                        id: Date.now(), 
                        amount, 
                        date: depositTimestamp,
                        lastEarningDay: 0,
                        earnedSoFar: firstDayProfit,
                        phoneNumber: phoneNumber, 
                        network: network
                    }),
                    transactions: arrayUnion(
                        {
                            id: Date.now(),
                            transactionId: depositTxId,
                            type: 'deposit',
                            amount: amount,
                            description: `Deposit of ${amount} UGX via ${network} Mobile Money (Approved by admin)${becameIndependent ? ' - INDEPENDENT USER' : ''}`,
                            date: new Date().toISOString(),
                            timestamp: depositTimestamp,
                            status: 'completed'
                        },
                        {
                            id: Date.now() + 1,
                            transactionId: profitTxId,
                            type: 'earning',
                            amount: firstDayProfit,
                            description: `Instant 10% profit on deposit (Day 1)`,
                            date: new Date().toISOString(),
                            timestamp: depositTimestamp,
                            status: 'completed'
                        }
                    )
                });
                
                systemSettings.adminEarnings += adminCommission;
                await saveSystemSettings();
                
                if (!becameIndependent) {
                    await processReferralCommissionForDeposit(userId, amount);
                }
                
                await deleteDoc(doc(db, 'depositRequests', requestId));
                
                pendingDeposits = pendingDeposits.filter(d => d.requestId !== requestId);
                updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                renderAdminPanel();
                
                if (becameIndependent) {
                    showAlert(`✅ Deposit approved! ${formatMoney(amount)} added. ⚠️ User became INDEPENDENT!`, 'warning');
                } else {
                    showAlert(`✅ Deposit approved! Admin earned ${formatMoney(adminCommission)} (${systemSettings.adminCommissionRate}%)`, 'success');
                }
                return true;
            } catch (error) {
                console.error('Error approving deposit:', error);
                showAlert('Failed to approve deposit', 'error');
                return false;
            }
        }

        async function approveWithdrawalRequest(requestId, userId, amount, phoneNumber, network, transactionId, fee, netAmount) {
            const confirmMsg = confirm(
                `✅ CONFIRM WITHDRAWAL PAYOUT\n\n` +
                `User requested: ${formatMoney(amount)}\n` +
                `Fee (10%): -${formatMoney(fee)}\n` +
                `━━━━━━━━━━━━━━━━━━━━\n` +
                `💰 You will send: ${formatMoney(netAmount)}\n\n` +
                `📱 To: ${phoneNumber}\n` +
                `📡 Network: ${network}\n\n` +
                `Mark as paid?`
            );
            
            if (!confirmMsg) return false;
            
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const transactions = user.transactions || [];
                    
                    const updatedTransactions = transactions.map(t => {
                        if (t.transactionId === transactionId || String(t.id) === transactionId) {
                            return { 
                                ...t, 
                                status: 'completed',
                                payoutRef: `ADMIN-${Date.now()}`,
                                paidAt: new Date().toISOString(),
                                paidAmount: netAmount,
                                paidTo: phoneNumber
                            };
                        }
                        return t;
                    });
                    
                    await updateDoc(userRef, { transactions: updatedTransactions });
                    await deleteDoc(doc(db, 'withdrawalRequests', requestId));
                    
                    pendingWithdrawalRequests = pendingWithdrawalRequests.filter(w => w.requestId !== requestId);
                    updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                    renderAdminPanel();
                    
                    showAlert(`✅ Withdrawal approved! Sent ${formatMoney(netAmount)} to ${phoneNumber} via ${network}`, 'success');
                    return true;
                }
            } catch (error) {
                console.error('Withdrawal approval error:', error);
                showAlert('Approval failed: ' + error.message, 'error');
                return false;
            }
        }
        
        async function rejectWithdrawalRequest(requestId, userId, amount, transactionId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    const transactions = user.transactions || [];
                    
                    const updatedTransactions = transactions.map(t => {
                        if (t.transactionId === transactionId || String(t.id) === transactionId) {
                            return { ...t, status: 'failed' };
                        }
                        return t;
                    });
                    
                    await updateDoc(userRef, { 
                        transactions: updatedTransactions,
                        earnings: (user.earnings || 0) + amount 
                    });
                    
                    await deleteDoc(doc(db, 'withdrawalRequests', requestId));
                    
                    pendingWithdrawalRequests = pendingWithdrawalRequests.filter(w => w.requestId !== requestId);
                    updateTabTitle(pendingDeposits.length, pendingWithdrawalRequests.length);
                    renderAdminPanel();
                    
                    showAlert(`Withdrawal rejected! ${formatMoney(amount)} returned to user.`, 'success');
                }
            } catch (error) {
                console.error('Rejection error:', error);
                showAlert('Rejection failed: ' + error.message, 'error');
            }
        }
        
        async function editUser(userId, updates) {
            const userRef = doc(db, 'users', userId);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) return;
            
            const user = userSnap.data();
            const updateData = {};
            
            if (updates.phone && /^07\d{8}$/.test(updates.phone)) updateData.phone = updates.phone;
            if (updates.password !== undefined) updateData.password = updates.password;
            if (updates.deposits !== undefined) updateData.deposits = updates.deposits;
            if (updates.earnings !== undefined) updateData.earnings = updates.earnings;
            if (updates.withdrawLocked !== undefined) updateData.withdrawLocked = updates.withdrawLocked;
            if (updates.referredBy !== undefined) updateData.referredBy = updates.referredBy;
            if (updates.isIndependent !== undefined) updateData.isIndependent = updates.isIndependent;
            
            await updateDoc(userRef, updateData);
            
            if (updates.newPassword && updates.newPassword.length >= 6) {
                try {
                    const userEmail = user.email;
                    const userAuth = await signInWithEmailAndPassword(auth, userEmail, updates.password || user.password);
                    await updatePassword(userAuth.user, updates.newPassword);

                } catch (e) {
                    console.error('Password update error:', e);
                    showAlert('Password update failed. User may need to reset manually.', 'error');

            }
            
            showAlert('User updated successfully!', 'success');

                            <div class="whatsapp-settings-row">
                                <label>👥 WhatsApp Group Link (Join Group Button)</label>
                                <input type="text" id="whatsappGroupLink" placeholder="https://chat.whatsapp.com/xxxxx" value="${whatsappGroupLink}">
                                <div class="whatsapp-preview">💬 Preview: <a href="${whatsappGroupLink || '#'}" target="_blank" id="groupPreviewLink">${whatsappGroupLink || 'Not set'}</a></div>
                                <div class="small-text">This link opens a WhatsApp group for users to join. Leave empty to hide the button.</div>
                            </div>
                            
                            <button class="btn btn-primary" id="saveWhatsappLinksBtn">Save WhatsApp Links</button>
                            <button class="btn btn-success" id="testChatLinkBtn">📱 Test Chat Link</button>
                            <button class="btn btn-success" id="testGroupLinkBtn">👥 Test Group Link</button>
                        </div>
                        
                        <div class="settings-group">
                            <h3>💰 Admin Commission Settings</h3>
                            <label>Deposit Commission Rate (%)</label>
                            <input type="number" id="adminCommissionRate" step="0.1" min="0" max="100" value="${systemSettings.adminCommissionRate}">
                            <div class="small-text" style="margin-top: 4px;">You earn this percentage on every approved deposit</div>
                            <div class="small-text" style="margin-top: 8px; color: #FFB347;">💰 Current Admin Earnings: ${formatMoney(systemSettings.adminEarnings)}</div>
                            <button class="btn btn-primary" id="saveCommissionBtn" style="margin-top: 12px;">Save Commission Rate</button>
                        </div>
                        
                        <div class="settings-group">
                            <h3>⚡ Independent User Rule</h3>
                            <div class="threshold-info" style="margin-bottom: 0;">
                                <strong>Threshold Amount:</strong> ${formatMoney(INDEPENDENT_THRESHOLD)}<br>
                                <strong>Effect:</strong> Users who deposit this amount or more become INDEPENDENT. Their referral link is removed and NO referral commissions are paid.
                            </div>
                        </div>
                        
                        <div class="settings-group">
                            <h3>🔒 System Controls</h3>
                            <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                <span>Block All Withdrawals (Hidden Lock - Users see "Insufficient Balance")</span>
                                <label class="switch">
                                    <input type="checkbox" id="globalWithdrawLock" ${systemSettings.withdrawLocked ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </label>
                            <div class="small-text" style="margin-top: 4px; color: #F59E0B;">
                                ⚠️ When enabled, users see "Insufficient Balance" even if they have enough funds
                            </div>
                        </div>
                        
                        <div class="settings-group">
                            <h3>📱 App Download Controls</h3>
                            <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                <span>Disable App Download Button</span>
                                <label class="switch">
                                    <input type="checkbox" id="disableAppDownload" ${systemSettings.appDownloadDisabled ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </label>
                            <div class="small-text" style="margin-top: 4px; color: #F59E0B;">
                                ⚠️ When enabled, the "Download App" button becomes unclickable for all users
                            </div>
                        </div>
                        
                        <div class="settings-group">
                            <h3>⚙️ System Settings</h3>
                            <input type="number" id="minDeposit" placeholder="Minimum Deposit" value="${systemSettings.minDeposit}">
                            <input type="number" id="minWithdraw" placeholder="Minimum Withdrawal" value="${systemSettings.minWithdraw}">
                            <input type="number" id="withdrawFee" placeholder="Withdrawal Fee (%)" value="${systemSettings.withdrawFee}">
                            <input type="number" id="dailyProfit" placeholder="Daily Profit (%)" value="${systemSettings.dailyProfit}">
                            <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                        </div>
                        
                        <hr>
                        
                        <div class="settings-group danger-zone">
                            <h3>⚠️ DANGER ZONE - Delete Data</h3>
                            <div class="danger-btn-group">
                                <button class="btn danger-btn" id="deleteAllUsersBtn">🗑️ Delete All Users</button>
                                <button class="btn danger-btn" id="deleteAllDepositsBtn">🗑️ Delete All Deposits</button>
                                <button class="btn danger-btn" id="deleteAllWithdrawalsBtn">🗑️ Delete All Withdrawals</button>
                                <button class="btn danger-btn" id="deleteAllDataBtn" style="background: #B91C1C;">🔴 DELETE EVERYTHING</button>
                            </div>
                            <div class="small-text" style="margin-top: 12px; color: #F59E0B;">
                                ⚠️ These actions delete Firestore data only. Admin login credentials remain unchanged.<br>
                                🔴 "DELETE EVERYTHING" requires typing "DELETE" to confirm.
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('logoutBtn').onclick = () => adminLogout();
            
            document.getElementById('downloadAppBtn')?.addEventListener('click', () => {
                window.open(APK_DOWNLOAD_URL, '_blank');
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => { currentTab = btn.dataset.tab; renderAdminPanel(); };
            });
            
            document.querySelectorAll('#depositsTab .btn-success').forEach(btn => {
                btn.onclick = async () => {
                    const requestId = btn.dataset.requestId;
                    const userId = btn.dataset.userId;
                    const amount = parseFloat(btn.dataset.amount);
                    const phone = btn.dataset.phone;
                    const network = btn.dataset.network;
                    await approveDeposit(requestId, userId, amount, phone, network);
                };
            });
            
            document.querySelectorAll('#depositsTab .btn-danger').forEach(btn => {
                btn.onclick = async () => {
                    const requestId = btn.dataset.requestId;
                    await rejectDeposit(requestId);
                };
            });
            
            document.querySelectorAll('#withdrawalsTab .btn-success').forEach(btn => {
                btn.onclick = async () => {
                    const requestId = btn.dataset.requestId;
                    const userId = btn.dataset.userId;
                    const amount = parseFloat(btn.dataset.amount);
                    const phone = btn.dataset.phone;
                    const network = btn.dataset.network;
                    const txid = btn.dataset.txid;
                    const fee = parseFloat(btn.dataset.fee);
                    const net = parseFloat(btn.dataset.net);
                    await approveWithdrawalRequest(requestId, userId, amount, phone, network, txid, fee, net);
                };
            });
            
            document.querySelectorAll('#withdrawalsTab .btn-danger').forEach(btn => {
                btn.onclick = async () => {
                    const requestId = btn.dataset.requestId;
                    const userId = btn.dataset.userId;
                    const amount = parseFloat(btn.dataset.amount);
                    const txid = btn.dataset.txid;
                    await rejectWithdrawalRequest(requestId, userId, amount, txid);
                };
            });
            
            const globalLock = document.getElementById('globalWithdrawLock');
            if (globalLock) {
                globalLock.onchange = async (e) => {
                    systemSettings.withdrawLocked = e.target.checked;
                    await saveSystemSettings();
                    showAlert(`Global withdraw lock ${systemSettings.withdrawLocked ? 'ENABLED' : 'DISABLED'} - Users will see "Insufficient Balance" when locked`, 'success');
                };
            }
            
            const disableAppDownload = document.getElementById('disableAppDownload');
            if (disableAppDownload) {
                disableAppDownload.onchange = async (e) => {
                    systemSettings.appDownloadDisabled = e.target.checked;
                    await saveSystemSettings();
                    showAlert(`App download button ${systemSettings.appDownloadDisabled ? 'DISABLED' : 'ENABLED'}`, 'success');
                };
            }
            
            document.getElementById('deleteAllUsersBtn')?.addEventListener('click', deleteAllUsers);
            document.getElementById('deleteAllDepositsBtn')?.addEventListener('click', deleteAllDepositRequests);
            document.getElementById('deleteAllWithdrawalsBtn')?.addEventListener('click', deleteAllWithdrawalRequests);
            document.getElementById('deleteAllDataBtn')?.addEventListener('click', deleteAllData);
            
            const saveWhatsappLinksBtn = document.getElementById('saveWhatsappLinksBtn');
            if (saveWhatsappLinksBtn) {
                saveWhatsappLinksBtn.onclick = async () => {
                    systemSettings.whatsappChatLink = document.getElementById('whatsappChatLink').value;
                    systemSettings.whatsappGroupLink = document.getElementById('whatsappGroupLink').value;
                    await saveSystemSettings();
                    showAlert('WhatsApp links saved!', 'success');
                    renderAdminPanel();
                };
            }
            
            const testChatLinkBtn = document.getElementById('testChatLinkBtn');
            if (testChatLinkBtn) {
                testChatLinkBtn.onclick = () => {
                    const link = document.getElementById('whatsappChatLink').value;
                    if (link) window.open(link, '_blank');
                    else showAlert('No chat link set', 'error');
                };
            }
            
            const testGroupLinkBtn = document.getElementById('testGroupLinkBtn');
            if (testGroupLinkBtn) {
                testGroupLinkBtn.onclick = () => {
                    const link = document.getElementById('whatsappGroupLink').value;
                    if (link) window.open(link, '_blank');
                    else showAlert('No group link set', 'error');
                };
            }
            
            const chatLinkInput = document.getElementById('whatsappChatLink');
            if (chatLinkInput) {
                chatLinkInput.oninput = (e) => {
                    const preview = document.getElementById('chatPreviewLink');
                    if (preview) { preview.href = e.target.value || '#'; preview.textContent = e.target.value || 'Not set'; }
                };
            }
            
            const groupLinkInput = document.getElementById('whatsappGroupLink');
            if (groupLinkInput) {
                groupLinkInput.oninput = (e) => {
                    const preview = document.getElementById('groupPreviewLink');
                    if (preview) { preview.href = e.target.value || '#'; preview.textContent = e.target.value || 'Not set'; }
                };
            }
            
            const saveCommissionBtn = document.getElementById('saveCommissionBtn');
            if (saveCommissionBtn) {
                saveCommissionBtn.onclick = async () => {
                    systemSettings.adminCommissionRate = parseFloat(document.getElementById('adminCommissionRate').value) || 3.5;
                    await saveSystemSettings();
                    showAlert(`Admin commission rate set to ${systemSettings.adminCommissionRate}%`, 'success');
                    renderAdminPanel();
                };
            }
            
            const depositSearch = document.getElementById('searchDeposits');
            if (depositSearch) {
                depositSearch.oninput = (e) => {
                    sessionStorage.setItem('depositSearch', e.target.value);
                    renderAdminPanel();
                };
            }
            
            const withdrawalSearch = document.getElementById('searchWithdrawals');
            if (withdrawalSearch) {
                withdrawalSearch.oninput = (e) => {
                    sessionStorage.setItem('withdrawalSearch', e.target.value);
                    renderAdminPanel();
                };
            }
            
            const userSearch = document.getElementById('searchUsers');
            if (userSearch) {
                userSearch.oninput = (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filtered = allUsers.filter(u => u.username.toLowerCase().includes(searchTerm) || (u.phone && u.phone.includes(searchTerm)));
                    const tbody = document.getElementById('usersTableBody');
                    if (tbody) {
                        tbody.innerHTML = filtered.map(user => `
                            <tr>
                                <td><strong>${user.username}</strong>${user.isIndependent ? ' <span class="status-badge status-independent">⚡ INDEPENDENT</span>' : ''}</td>
                                <td>${user.phone || 'N/A'}</td>
                                <td>${formatMoney(user.deposits || 0)}</td>
                                <td>${formatMoney(user.earnings || 0)}</td>
                                <td>${formatMoney(user.withdraws || 0)}</td>
                                <td>${user.referrals?.length || 0}</td>
                                <td><span class="status-badge ${user.withdrawLocked ? 'status-locked' : 'status-active'}">${user.withdrawLocked ? '🔒 Locked' : '✅ Active'}</span></td>
                                <td>
                                    <button class="btn btn-primary" onclick="window.viewUserDetails('${user.uid}')">📋 View</button>
                                    <button class="btn btn-warning" onclick="window.editUserModal('${user.uid}', '${user.username}', '${user.phone || ''}', ${user.deposits || 0}, ${user.earnings || 0}, ${user.withdrawLocked || false}, '${user.password || ''}')">✏️ Edit</button>
                                    <button class="btn ${user.withdrawLocked ? 'btn-success' : 'btn-warning'}" onclick="window.toggleWithdrawLock('${user.uid}', ${user.withdrawLocked || false})">${user.withdrawLocked ? '🔓 Unlock' : '🔒 Lock'}</button>
                                    <button class="btn btn-danger" onclick="window.deleteUserAccount('${user.uid}', '${user.username}')">🗑️ Delete</button>
                                </td>
                            </tr>
                        `).join('');
                    }
                };
            }
            
            const saveSettings = document.getElementById('saveSettingsBtn');
            if (saveSettings) {
                saveSettings.onclick = async () => {
                    systemSettings.minDeposit = parseInt(document.getElementById('minDeposit').value) || 10000;
                    systemSettings.minWithdraw = parseInt(document.getElementById('minWithdraw').value) || 5000;
                    systemSettings.withdrawFee = parseInt(document.getElementById('withdrawFee').value) || 10;
                    systemSettings.dailyProfit = parseInt(document.getElementById('dailyProfit').value) || 10;
                    await saveSystemSettings();
                    showAlert('System settings saved!', 'success');
                };
            }
        }
        
        async function getUserReferralsWithInvestment(userId) {
            try {
                const userRef = doc(db, 'users', userId);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) return [];
                
                const referrals = userSnap.data().referrals || [];
                const referralsWithInvestment = await Promise.all(referrals.map(async (ref) => {
                    const refUserRef = doc(db, 'users', ref.userId);
                    const refUserSnap = await getDoc(refUserRef);
                    const invested = refUserSnap.exists() ? (refUserSnap.data().deposits || 0) : 0;
                    return {
                        ...ref,
                        invested: invested
                    };
                }));
                return referralsWithInvestment;
            } catch (error) {
                console.error('Error getting referrals:', error);
                return [];
            }
        }
        
        window.viewUserDetails = async (userId) => {
            const user = allUsers.find(u => u.uid === userId);
            if (!user) return;
            
            const referralsWithInvestment = await getUserReferralsWithInvestment(userId);
            const totalTeamInvestment = referralsWithInvestment.reduce((sum, ref) => sum + ref.invested, 0);
            const commission = totalTeamInvestment * 0.1;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📋 User Details: ${user.username}</h3>
                    <p><strong>Phone:</strong> ${user.phone || 'Not set'}</p>
                    <p><strong>Country:</strong> ${user.country || 'Uganda'}</p>
                    <p><strong>Password:</strong> ${user.password || 'Not stored'}</p>
                    <p><strong>Referred By:</strong> ${user.referredBy || 'None'} ${user.isIndependent ? '<span style="color:#8B5CF6;"> (INDEPENDENT)</span>' : ''}</p>
                    <p><strong>Deposits:</strong> ${formatMoney(user.deposits || 0)}</p>
                    <p><strong>Earnings:</strong> ${formatMoney(user.earnings || 0)}</p>
                    <p><strong>Withdrawals:</strong> ${formatMoney(user.withdraws || 0)}</p>
                    <p><strong>Active Deposits:</strong> ${user.activeDeposits?.length || 0}</p>
                    <p><strong>Referrals Count:</strong> ${user.referrals?.length || 0}</p>
                    ${referralsWithInvestment.length > 0 ? `
                        <p><strong>👥 Referrals List:</strong></p>
                        <div class="referral-list-modal">
                            ${referralsWithInvestment.map(ref => `
                                <div class="referral-item-modal">
                                    <span>👤 ${ref.username}</span>
                                    <span>💰 ${formatMoney(ref.invested)}</span>
                                    <span class="small-text">Joined: ${new Date(ref.joinedAt).toLocaleDateString()}</span>
                                </div>
                            `).join('')}
                            <div class="referral-item-modal" style="border-top: 1px solid #FFB347; margin-top: 5px; padding-top: 8px;">
                                <strong>💰 Total Team Investment:</strong>
                                <strong style="color: #FFB347;">${formatMoney(totalTeamInvestment)}</strong>
                            </div>
                            <div class="referral-item-modal">
                                <strong>🎯 Your 10% Commission:</strong>
                                <strong style="color: #10B981;">${formatMoney(commission)}</strong>
                            </div>
                        </div>
                    ` : '<p><strong>👥 Referrals:</strong> None</p>'}
                    <p><strong>Status:</strong> ${user.withdrawLocked ? '🔒 Withdraw Locked' : '✅ Active'} ${user.isIndependent ? ' | ⚡ INDEPENDENT' : ''}</p>
                    <div style="display: flex; gap: 10px; margin-top: 16px;"><button class="btn btn-primary" id="closeModal">Close</button></div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('closeModal').onclick = () => modal.remove();
        };
        
        window.editUserModal = async (userId, username, currentPhone, currentDeposits, currentEarnings, currentLock, currentPassword) => {
            const user = allUsers.find(u => u.uid === userId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>✏️ Edit User: ${username}</h3>
                    <div class="form-group">
                        <label>📱 Phone Number (07XXXXXXXX)</label>
                        <input type="tel" id="editPhone" class="edit-input" value="${currentPhone}" placeholder="07XXXXXXXX">
                    </div>
                    <div class="form-group password-field">
                        <label>🔐 Current Password</label>
                        <input type="password" id="editCurrentPassword" class="edit-input" value="${currentPassword || ''}" readonly disabled>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('editCurrentPassword')">👁️ Show</button>
                    </div>
                    <div class="form-group">
                        <label>🔒 New Password (leave blank to keep current)</label>
                        <input type="password" id="editNewPassword" class="edit-input" placeholder="New password (min 6 chars)">
                    </div>
                    <div class="form-group">
                        <label>💰 Deposits Balance</label>
                        <input type="number" id="editDeposits" class="edit-input" value="${currentDeposits}">
                    </div>
                    <div class="form-group">
                        <label>📈 Earnings Balance</label>
                        <input type="number" id="editEarnings" class="edit-input" value="${currentEarnings}">
                    </div>
                    <div class="toggle-group">
                        <label>🔐 Withdraw Lock</label>
                        <label class="switch">
                            <input type="checkbox" id="editWithdrawLock" ${currentLock ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    ${!user?.isIndependent ? `
                    <div class="form-group">
                        <label>👥 Referred By (username)</label>
                        <input type="text" id="editReferredBy" class="edit-input" value="${user?.referredBy || ''}" placeholder="Leave empty for none">
                    </div>
                    <div class="toggle-group">
                        <label>⚡ Make Independent (removes referral)</label>
                        <label class="switch">
                            <input type="checkbox" id="editIndependent" ${user?.isIndependent ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                    ` : '<div class="alert alert-warning">⚠️ This user is INDEPENDENT. Referral link is removed.</div>'}
                    <div style="display: flex; gap: 10px; margin-top: 16px;">
                        <button class="btn btn-success" id="saveEditBtn">Save Changes</button>
                        <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            window.togglePasswordVisibility = (fieldId) => {
                const field = document.getElementById(fieldId);
                if (field.type === 'password') {
                    field.type = 'text';
                } else {
                    field.type = 'password';
                }
            };
            
            document.getElementById('saveEditBtn').onclick = async () => {
                const phone = document.getElementById('editPhone').value;
                const newPassword = document.getElementById('editNewPassword').value;
                const deposits = parseInt(document.getElementById('editDeposits').value) || 0;
                const earnings = parseInt(document.getElementById('editEarnings').value) || 0;
                const withdrawLocked = document.getElementById('editWithdrawLock').checked;
                const referredBy = document.getElementById('editReferredBy')?.value || null;
                const isIndependent = document.getElementById('editIndependent')?.checked || false;
                
                if (phone && !/^07\d{8}$/.test(phone)) {
                    showAlert('Phone must start with 07 and be 10 digits', 'error');
                    return;
                }
                
                const updates = { phone, deposits, earnings, withdrawLocked };
                if (referredBy !== undefined) updates.referredBy = referredBy || null;
                if (isIndependent !== undefined) updates.isIndependent = isIndependent;
                if (newPassword && newPassword.length >= 6) {
                    updates.newPassword = newPassword;
                }
                
                await editUser(userId, updates);
                modal.remove();
            };
            document.getElementById('cancelEditBtn').onclick = () => modal.remove();
        };
        
        window.toggleWithdrawLock = async (userId, currentLock) => { await toggleUserWithdrawLock(userId, currentLock); };
        window.deleteUserAccount = async (userId, username) => { await deleteUser(userId, username); };
        window.approveDeposit = async (requestId, userId, amount, phoneNumber, network) => { await approveDeposit(requestId, userId, amount, phoneNumber, network); };
        window.rejectDeposit = async (requestId) => { await rejectDeposit(requestId); };
        window.approveWithdrawalRequest = async (requestId, userId, amount, phoneNumber, network, transactionId, fee, netAmount) => { await approveWithdrawalRequest(requestId, userId, amount, phoneNumber, network, transactionId, fee, netAmount); };
        window.rejectWithdrawalRequest = async (requestId, userId, amount, transactionId) => { await rejectWithdrawalRequest(requestId, userId, amount, transactionId); };
        
        async function deleteAllUsers() {
            if (confirm('⚠️ Are you sure you want to delete ALL users? This action cannot be undone!')) {
                const batch = writeBatch(db);
                const usersSnapshot = await getDocs(collection(db, 'users'));
                usersSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All users deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllDepositRequests() {
            if (confirm('⚠️ Delete ALL deposit requests? This action cannot be undone!')) {
                const batch = writeBatch(db);
                const depositsSnapshot = await getDocs(collection(db, 'depositRequests'));
                depositsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All deposit requests deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllWithdrawalRequests() {
            if (confirm('⚠️ Delete ALL withdrawal requests? This action cannot be undone!')) {
                const batch = writeBatch(db);
                const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
                withdrawalsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('All withdrawal requests deleted!', 'success');
                await refreshData();
            }
        }
        
        async function deleteAllData() {
            const confirmText = prompt('⚠️ DANGER: This will delete EVERYTHING (users, deposits, withdrawals). Type "DELETE" to confirm:');
            if (confirmText === 'DELETE') {
                const batch = writeBatch(db);
                const usersSnapshot = await getDocs(collection(db, 'users'));
                usersSnapshot.forEach(doc => batch.delete(doc.ref));
                const depositsSnapshot = await getDocs(collection(db, 'depositRequests'));
                depositsSnapshot.forEach(doc => batch.delete(doc.ref));
                const withdrawalsSnapshot = await getDocs(collection(db, 'withdrawalRequests'));
                withdrawalsSnapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                showAlert('ALL DATA DELETED!', 'warning');
                await refreshData();
            } else {
                showAlert('Deletion cancelled', 'error');
            }
        }
        
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            currentUser = { username: 'admin', isAdmin: true };
            requestNotificationPermission();
            await refreshData();
            setupDepositListener();
            setupWithdrawalListener();
        } else {
            showLoginPage();
        }
    </script>
</body>
</html>
